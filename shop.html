<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="styles.css">
<script defer src="app.js"></script>
</head>

<body>

<header>
  <a class="navlink" href="index.html">Home</a>
  <a class="navlink" href="shop.html">Shop</a>
  <a class="navlink" href="about.html">About</a>
  <a class="navlink" href="cart.html">Cart (<span id="cart-count">0</span>)</a>
</header>

<div class="page">
  <h1>Shop</h1>
  <div id="grid"></div>
</div>

<script>
const grid = document.getElementById("grid");

Object.values(items).forEach(p=>{
  grid.innerHTML += `
    <div class="card" onclick="location.href='product.html?id=${p.id}'">
      <img src="${p.image}" style="width:100%">
      <h3>${p.name}</h3>
      <p>$${p.price}</p>
    </div>
  `;
});

updateCartUI();
</script>

</body>
</html>
