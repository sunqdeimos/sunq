<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | SUNQ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">SUNQ</a>
            <div class="nav-links">
                <a href="shop.html">Shop</a>
                <a href="about.html">About</a>
                <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            </div>
        </div>
    </nav>

    <main>
        <section class="collection">
            <h2 class="collection-title">SUNQS</h2>
            <div class="product-grid" id="sunqs-grid"></div>
        </section>

        <section class="collection">
            <h2 class="collection-title">JETS</h2>
            <div class="product-grid" id="jets-grid"></div>
        </section>
    </main>

    <script>
        // Same product database as product.html
        const items = {
            "sunqs-a": {
                id: "sunqs-a",
                name: "SUNQ Alpha Hoodie",
                price: 89.00,
                image: "https://placehold.co/600x600/1a1a1a/gold?text=SUNQ+A",
                category: "sunqs"
            },
            "sunqs-b": {
                id: "sunqs-b",
                name: "SUNQ Essential Tee",
                price: 39.00,
                image: "https://placehold.co/600x600/1a1a1a/gold?text=SUNQ+B",
                category: "sunqs"
            },
            "sunqs-c": {
                id: "sunqs-c",
                name: "SUNQ Cargo Pants",
                price: 129.00,
                image: "https://placehold.co/600x600/1a1a1a/gold?text=SUNQ+C",
                category: "sunqs"
            },
            "jets-a": {
                id: "jets-a",
                name: "JETS Varsity Jacket",
                price: 199.00,
                image: "https://placehold.co/600x600/1a1a1a/gold?text=JETS+A",
                category: "jets"
            },
            "jets-b": {
                id: "jets-b",
                name: "JETS Cap",
                price: 35.00,
                image: "https://placehold.co/600x600/1a1a1a/gold?text=JETS+B",
                category: "jets"
            },
            "jets-c": {
                id: "jets-c",
                name: "JETS Technical Trousers",
                price: 149.00,
                image: "https://placehold.co/600x600/1a1a1a/gold?text=JETS+C",
                category: "jets"
            }
        };

        function renderProductGrid(containerId, category) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const products = Object.values(items).filter(p => p.category === category);
            if (products.length === 0) {
                container.innerHTML = '<p>No products in this collection yet.</p>';
                return;
            }
            let html = '';
            products.forEach(p => {
                html += `
                    <div class="product-card">
                        <img src="${p.image}" alt="${p.name}" class="product-img">
                        <div class="product-info">
                            <h3>${p.name}</h3>
                            <p class="price">$${p.price.toFixed(2)}</p>
                            <a href="product.html?item=${p.id}" class="view-btn">View Product</a>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function getCart() {
            return JSON.parse(localStorage.getItem('sunqCart')) || [];
        }

        function updateCartCountDisplay() {
            const cart = getCart();
            let total = 0;
            cart.forEach(item => { total += item.quantity; });
            const countSpan = document.getElementById('cart-count');
            if (countSpan) countSpan.innerText = total;
        }

        renderProductGrid('sunqs-grid', 'sunqs');
        renderProductGrid('jets-grid', 'jets');
        updateCartCountDisplay();
        window.addEventListener('storage', updateCartCountDisplay);
    </script>

    <style>
        .collection {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        .collection-title {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--gold, #D4AF37);
            padding-left: 1rem;
        }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }
        .product-card {
            background: var(--panel, #111);
            border-radius: 1rem;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .product-img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }
        .product-info {
            padding: 1rem;
        }
        .product-info h3 {
            margin: 0 0 0.5rem;
        }
        .price {
            color: var(--gold, #D4AF37);
            font-weight: bold;
            font-size: 1.2rem;
        }
        .view-btn {
            display: inline-block;
            margin-top: 0.75rem;
            background: var(--gold, #D4AF37);
            color: #0a0a0a;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: bold;
        }
        .navbar {
            background: rgba(10,10,10,0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            padding: 1rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gold, #D4AF37);
            text-decoration: none;
        }
        .nav-links a {
            color: white;
            margin-left: 2rem;
            text-decoration: none;
        }
        .nav-links a:hover {
            color: var(--gold, #D4AF37);
        }
    </style>
</body>
</html>
