<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <a href="index.html" class="logo navlink">SUNQ</a>

  <div>
    <a href="shop.html" class="navlink">Shop</a>
    <a href="about.html" class="navlink">About</a>
    <a href="cart.html" class="navlink">Cart</a>
  </div>
</header>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filter('all',event)">ALL</button>
  <button class="filter-btn" onclick="filter('sunqs',event)">SUNQS</button>
  <button class="filter-btn" onclick="filter('jets',event)">JETS</button>
</div>

<div class="grid" id="grid"></div>

<script>
window.onload=()=>document.body.classList.add("loaded");

const items=[
  {id:"item-a",name:"SUNQS A",price:10,cat:"sunqs"},
  {id:"item-b",name:"SUNQS B",price:15,cat:"sunqs"},
  {id:"item-c",name:"SUNQS C",price:20,cat:"sunqs"},
  {id:"item-d",name:"JETS A",price:25,cat:"jets"},
  {id:"item-e",name:"JETS B",price:30,cat:"jets"},
  {id:"item-f",name:"JETS C",price:40,cat:"jets"}
];

let current="all";

function render(){
  const g=document.getElementById("grid");
  g.innerHTML="";

  items.filter(i=>current==="all"||i.cat===current)
    .forEach(i=>{
      g.innerHTML+=`
        <div class="card">
          <h2>${i.name}</h2>
          <p>$${i.price}</p>
          <a class="button-primary" href="product.html?item=${i.id}">View</a>
        </div>
      `;
    });
}

function filter(type,e){
  current=type;

  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  e.target.classList.add("active");

  render();
}

render();
</script>

</body>
</html>
