<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNQS MARKET | Shop</title>

<style>
body{margin:0;font-family:Arial;background:#070707;color:#fff;}

header{
  padding:20px;
  border-bottom:1px solid #333;
  display:flex;
  justify-content:space-between;
}

a{color:#ffcc33;text-decoration:none;margin-right:10px;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#111;
  border:1px solid #ffcc33;
  padding:15px;
  cursor:pointer;
}

.price{color:#ffcc33;}

.cart{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#111;
  border:1px solid #ffcc33;
  padding:10px 15px;
  color:#ffcc33;
  border-radius:20px;
}
</style>
</head>

<body>

<header>
  <div>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
  </div>
</header>

<div class="grid">

  <div class="card" onclick="addToCart('Item One','$10');go('1')">
    Item One
    <div class="price">$10</div>
  </div>

  <div class="card" onclick="addToCart('Item Two','$15');go('2')">
    Item Two
    <div class="price">$15</div>
  </div>

  <div class="card" onclick="addToCart('Item Three','$20');go('3')">
    Item Three
    <div class="price">$20</div>
  </div>

</div>

<div class="cart" onclick="viewCart()">
Cart (<span id="count"></span>)
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name,price){
  cart.push({name,price});
  localStorage.setItem("cart",JSON.stringify(cart));
  update();
}

function update(){
  document.getElementById("count").innerText = cart.length;
}
update();

function viewCart(){
  alert(cart.map(i=>i.name+" "+i.price).join("\n") || "Empty cart");
}

function go(id){
  location.href="product.html?item="+id;
}
</script>

</body>
</html>
