<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNQS MARKET</title>

<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>

<body>

<header>
  <a href="index.html" class="logo">SUNQ</a>

  <div class="nav-right">
    <a class="navlink" href="index.html">Home</a>
    <a class="navlink" href="shop.html">Shop</a>
    <a class="navlink" href="about.html">About</a>
    <a class="navlink" href="cart.html">Cart (<span id="cart-count">0</span>)</a>
  </div>
</header>

<div class="hero">
  <h1>SUNQS MARKET</h1>
  <p>Browse SUNQS and JETS collections. Filter, search, and explore listings.</p>
</div>

<div class="shop-controls">
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="ALL">ALL</button>
    <button class="filter-btn" data-filter="SUNQS">SUNQS</button>
    <button class="filter-btn" data-filter="JETS">JETS</button>
  </div>

  <input class="search" id="search" placeholder="Search products...">
</div>

<div class="grid" id="grid"></div>

<script src="products.js"></script>

<script>
window.onload=()=>{
  document.body.classList.add("loaded");
  updateCartCountDisplay();
};

let currentFilter="ALL";

function renderProducts(){
  const grid=document.getElementById("grid");
  const search=document.getElementById("search").value.toLowerCase().trim();

  grid.innerHTML="";

  let filtered=PRODUCTS.filter(p=>{
    const matchesFilter = currentFilter==="ALL" || p.category===currentFilter;
    const matchesSearch = p.name.toLowerCase().includes(search);
    return matchesFilter && matchesSearch;
  });

  if(filtered.length===0){
    grid.innerHTML=`<div class="card"><div class="content"><h2>No results</h2><p>Try another search or filter.</p></div></div>`;
    return;
  }

  filtered.forEach(p=>{
    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img src="${p.img}">
      <div class="content">
        <div class="badge">${p.category}</div>
        <h2>${p.name}</h2>
        <p>${p.desc}</p>
        <div class="price">$${p.price}</div>
        <br>
        <a class="button-primary" href="product.html?item=${p.id}">View Product</a>
      </div>
    `;

    grid.appendChild(card);
  });
}

document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");

    currentFilter=btn.dataset.filter;

    document.getElementById("grid").style.opacity="0";
    setTimeout(()=>{
      renderProducts();
      document.getElementById("grid").style.opacity="1";
    },200);
  });
});

document.getElementById("search").addEventListener("input", ()=>{
  renderProducts();
});

renderProducts();
</script>

</body>
</html>
