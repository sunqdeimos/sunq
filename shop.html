<!DOCTYPE html>
<html>
<head>
  <title>Shop</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<h1>SUNQS MARKET</h1>

<div id="grid"></div>

<script src="data.js"></script>

<script>
const grid = document.getElementById("grid");

grid.innerHTML = Object.values(PRODUCTS).map(p => `
  <div style="margin:20px;">
    <img src="${p.image}" style="width:200px">
    <h3>${p.name}</h3>
    <p>$${p.price}</p>
    <a href="product.html?item=${p.id}">View</a>
  </div>
`).join("");
</script>

</body>
</html>
