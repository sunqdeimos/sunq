<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <a class="logo" href="index.html">SUNQ</a>
    <div class="nav-links">
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
    </div>
  </div>
</nav>

<div style="text-align:center;padding:20px;">
  <button class="filter-btn active" onclick="filter('all',this)">All</button>
  <button class="filter-btn" onclick="filter('sunqs',this)">SUNQS</button>
  <button class="filter-btn" onclick="filter('jets',this)">JETS</button>
</div>

<div class="grid" id="grid"></div>

<script>
const items = [
  {id:"a",name:"SUNQS A",price:10,cat:"sunqs"},
  {id:"b",name:"SUNQS B",price:15,cat:"sunqs"},
  {id:"c",name:"SUNQS C",price:20,cat:"sunqs"},
  {id:"d",name:"SUNQS D",price:25,cat:"sunqs"},
  {id:"e",name:"SUNQS E",price:30,cat:"sunqs"},

  {id:"f",name:"JETS A",price:12,cat:"jets"},
  {id:"g",name:"JETS B",price:18,cat:"jets"},
  {id:"h",name:"JETS C",price:22,cat:"jets"},
  {id:"i",name:"JETS D",price:28,cat:"jets"},
  {id:"j",name:"JETS E",price:35,cat:"jets"},
];

let current="all";

function render(){
  const g=document.getElementById("grid");

  g.style.opacity=0;
  setTimeout(()=>{

    g.innerHTML="";

    items
    .filter(i=>current==="all"?true:i.cat===current)
    .forEach(i=>{
      g.innerHTML+=`
        <div class="card">
          <h2>${i.name}</h2>
          <p>$${i.price}</p>
          <a class="button-primary" href="product.html?id=${i.id}">View</a>
        </div>
      `;
    });

    g.style.opacity=1;

  },150);
}

function filter(c,btn){
  current=c;

  document.querySelectorAll(".filter-btn")
  .forEach(b=>b.classList.remove("active"));

  btn.classList.add("active");

  render();
}

render();

/* CART */
function getCart(){
  return JSON.parse(localStorage.getItem("sunqCart")) || [];
}

document.getElementById("cart-count").innerText =
getCart().reduce((a,b)=>a+b.quantity,0);
</script>

</body>
</html>
