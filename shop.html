<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOP</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#070707;
  color:#fff;
  opacity:0;
  transition:0.6s ease;
}

body.loaded{opacity:1;}

header{
  padding:20px;
  border-bottom:1px solid #333;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

a{
  color:#ffcc33;
  text-decoration:none;
  margin-right:10px;
}

.toggle button{
  padding:8px 12px;
  background:#111;
  border:1px solid #ffcc33;
  color:#ffcc33;
  cursor:pointer;
  margin-left:6px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:22px;
  padding:25px;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#121212,#0d0d0d);
  border:1px solid rgba(255,204,51,0.25);
  border-radius:18px;
  cursor:pointer;
  transition:0.25s ease;
  overflow:hidden;
  min-height:320px;
  display:flex;
  flex-direction:column;
}

.card:hover{
  transform:translateY(-12px) scale(1.03);
  border-color:#ffcc33;
  box-shadow:0 20px 50px rgba(255,204,51,0.22);
}

/* IMAGE */
.img{
  height:160px;
  background:#111;
}

.img img{
  width:100%;
  height:160px;
  object-fit:cover;
}

/* TEXT */
.content{
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.title{
  font-size:22px;
  font-weight:bold;
}

.desc{
  color:#aaa;
  font-size:14px;
}

.price{
  color:#ffcc33;
  font-size:22px;
  font-weight:bold;
}
</style>
</head>

<body>

<header>
  <div>
    <a href="index.html" onclick="nav(event,'index.html')">Home</a>
    <a href="shop.html" onclick="nav(event,'shop.html')">Shop</a>
  </div>

  <div class="toggle">
    <button onclick="setSide('sunqs')">SUNQS</button>
    <button onclick="setSide('jets')">JETS</button>
  </div>
</header>

<div id="grid" class="grid"></div>

<script>
window.onload=()=>{document.body.classList.add("loaded");setSide("sunqs");};

function nav(e,url){
  e.preventDefault();
  document.body.classList.remove("loaded");
  setTimeout(()=>location.href=url,400);
}

/* PRODUCTS WITH IMAGES */
const products={
  sunqs:[
    {id:1,name:"SUNQS A",price:"$10",img:"https://via.placeholder.com/400"},
    {id:2,name:"SUNQS B",price:"$15",img:"https://via.placeholder.com/400"},
    {id:3,name:"SUNQS C",price:"$20",img:"https://via.placeholder.com/400"},
    {id:4,name:"SUNQS D",price:"$25",img:"https://via.placeholder.com/400"},
    {id:5,name:"SUNQS E",price:"$30",img:"https://via.placeholder.com/400"},
    {id:6,name:"SUNQS F",price:"$35",img:"https://via.placeholder.com/400"}
  ],
  jets:[
    {id:101,name:"JETS A",price:"$12",img:"https://via.placeholder.com/400"},
    {id:102,name:"JETS B",price:"$18",img:"https://via.placeholder.com/400"},
    {id:103,name:"JETS C",price:"$22",img:"https://via.placeholder.com/400"},
    {id:104,name:"JETS D",price:"$28",img:"https://via.placeholder.com/400"},
    {id:105,name:"JETS E",price:"$33",img:"https://via.placeholder.com/400"},
    {id:106,name:"JETS F",price:"$40",img:"https://via.placeholder.com/400"}
  ]
};

function setSide(side){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  products[side].forEach(p=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="img">
        <img src="${p.img}">
      </div>

      <div class="content">
        <div class="title">${p.name}</div>
        <div class="desc">Digital product listing</div>
        <div class="price">${p.price}</div>
      </div>
    `;

    div.onclick=()=>location.href="product.html?item="+p.id;
    grid.appendChild(div);
  });
}
</script>

</body>
</html>
