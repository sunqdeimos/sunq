<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<nav class="navbar">
  <a class="logo" href="index.html">SUNQ</a>
  <div class="nav-links">
    <a href="shop.html">Shop</a>
    <a href="about.html">About</a>
    <a href="cart.html">Cart</a>
  </div>
</nav>

<div style="padding:40px;text-align:center;">
  <button onclick="filter('all')" class="button-primary">ALL</button>
  <button onclick="filter('sunqs')" class="button-primary">SUNQS</button>
  <button onclick="filter('jets')" class="button-primary">JETS</button>
</div>

<div class="grid" id="grid"></div>

<script>
const products = [
  {id:"a1",name:"SUNQS A",price:10,img:"images/sunqs-a.jpg",tag:"sunqs"},
  {id:"a2",name:"SUNQS B",price:15,img:"images/sunqs-b.jpg",tag:"sunqs"},
  {id:"a3",name:"SUNQS C",price:20,img:"images/sunqs-c.jpg",tag:"sunqs"},
  {id:"a4",name:"SUNQS D",price:25,img:"images/sunqs-d.jpg",tag:"sunqs"},
  {id:"a5",name:"SUNQS E",price:30,img:"images/sunqs-e.jpg",tag:"sunqs"},

  {id:"j1",name:"JETS A",price:12,img:"images/jets-a.jpg",tag:"jets"},
  {id:"j2",name:"JETS B",price:18,img:"images/jets-b.jpg",tag:"jets"},
  {id:"j3",name:"JETS C",price:22,img:"images/jets-c.jpg",tag:"jets"},
  {id:"j4",name:"JETS D",price:28,img:"images/jets-d.jpg",tag:"jets"},
  {id:"j5",name:"JETS E",price:33,img:"images/jets-e.jpg",tag:"jets"}
];

function render(list){
  const grid=document.getElementById("grid");
  grid.innerHTML=list.map(p=>`
    <div class="product-card" onclick="openProduct('${p.id}')">
      <img src="${p.img}">
      <div class="product-info">
        <div style="font-weight:900">${p.name}</div>
        <div>$${p.price}</div>
      </div>
    </div>
  `).join("");
}

function filter(type){
  if(type==="all") return render(products);
  render(products.filter(p=>p.tag===type));
}

function openProduct(id){
  window.location.href="product.html?id="+id;
}

render(products);
</script>

</body>
</html>
