<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Shop | SUNQ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="styles.css">

  <!-- Supabase must load first -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Then the project connection -->
  <script src="supabase-config.js"></script>

  <!-- Then product data and shared UI -->
  <script src="data.js"></script>
  <script src="store-ui.js"></script>
</head>

<body>

  <!-- ================= NAVBAR ================= -->

  <nav class="navbar">
    <div class="nav-container">

      <a
        href="index.html"
        class="logo"
      >
        SUNQ
      </a>

      <div class="nav-links">

        <a
          href="shop.html"
          aria-current="page"
        >
          Shop
        </a>

        <a href="about.html">
          About
        </a>

        <a href="cart.html">
          Cart (<span id="cart-count">0</span>)
        </a>

      </div>

    </div>
  </nav>


  <!-- ================= SHOP ================= -->

  <main class="shop">

    <header class="page-header">

      <h1 class="page-title">
        Shop
      </h1>

      <p class="page-intro">
        Browse available listings by category, price,
        stock, or name.
      </p>

    </header>


    <!-- ================= CONTROLS ================= -->

    <div class="shop-controls">

      <!-- SEARCH -->

      <label
        class="search-wrapper"
        for="searchInput"
      >

        <span class="visually-hidden">
          Search products
        </span>

        <input
          id="searchInput"
          class="search-bar"
          type="search"
          placeholder="Search products, categories, or badges..."
          autocomplete="off"
          spellcheck="false"
          disabled
        >

      </label>


      <!-- CATEGORY FILTERS -->

      <section
        class="filter-section"
        aria-labelledby="category-filter-title"
      >

        <h2
          id="category-filter-title"
          class="control-label"
        >
          Category
        </h2>

        <div
          class="filter-bar category-filter-bar"
          role="group"
          aria-label="Product categories"
        >

          <button
            class="filter-btn active"
            type="button"
            data-filter="all"
            aria-pressed="true"
            disabled
          >
            All
          </button>

          <button
            class="filter-btn"
            type="button"
            data-filter="diamond-fa"
            aria-pressed="false"
            disabled
          >
            Diamond / Champ FA
          </button>

          <button
            class="filter-btn"
            type="button"
            data-filter="diamond-nfa"
            aria-pressed="false"
            disabled
          >
            Diamond / Champ NFA
          </button>

          <button
            class="filter-btn"
            type="button"
            data-filter="emerald-fa"
            aria-pressed="false"
            disabled
          >
            Emerald FA
          </button>

          <button
            class="filter-btn"
            type="button"
            data-filter="emerald-nfa"
            aria-pressed="false"
            disabled
          >
            Emerald NFA
          </button>

          <button
            class="filter-btn"
            type="button"
            data-filter="rank-ready"
            aria-pressed="false"
            disabled
          >
            Rank Ready
          </button>

        </div>

      </section>


      <!-- SORTING -->

      <section
        class="filter-section"
        aria-labelledby="sort-filter-title"
      >

        <h2
          id="sort-filter-title"
          class="control-label"
        >
          Sort
        </h2>

        <div
          class="filter-bar sort-filter-bar"
          role="group"
          aria-label="Sort products"
        >

          <button
            class="sort-btn active"
            type="button"
            data-sort="default"
            aria-pressed="true"
            disabled
          >
            Default
          </button>

          <button
            class="sort-btn"
            type="button"
            data-sort="low-high"
            aria-pressed="false"
            disabled
          >
            Low → High
          </button>

          <button
            class="sort-btn"
            type="button"
            data-sort="high-low"
            aria-pressed="false"
            disabled
          >
            High → Low
          </button>

        </div>

      </section>

    </div>


    <!-- ================= RESULTS ================= -->

    <div class="results-toolbar">

      <p
        id="resultsCount"
        class="results-count"
        aria-live="polite"
      >
        Loading products...
      </p>

      <button
        id="clearFiltersButton"
        class="text-button"
        type="button"
        hidden
      >
        Clear filters
      </button>

    </div>


    <!-- ================= PRODUCT GRID ================= -->

    <section
      id="productGrid"
      aria-live="polite"
      aria-busy="true"
    >

      <section class="empty-state">
        <p class="empty-state-kicker">
          Loading
        </p>

        <h2>
          Getting the shop ready.
        </h2>

        <p>
          This should only take a moment.
        </p>
      </section>

    </section>

  </main>


  <!-- ================= FOOTER ================= -->

  <footer class="site-footer">

    <div class="footer-inner">

      <div class="footer-brand">

        <a
          href="index.html"
          class="footer-logo"
        >
          SUNQ
        </a>

        <p>
          Built one listing at a time.
        </p>

      </div>

      <nav
        class="footer-links"
        aria-label="Footer navigation"
      >
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="cart.html">Cart</a>
      </nav>

      <p class="footer-copy">
        © 2026 SUNQ
      </p>

    </div>

  </footer>


  <!-- ================= SHOP LOGIC ================= -->

  <script>
    const VALID_CATEGORIES = [
      "all",
      "diamond-fa",
      "diamond-nfa",
      "emerald-fa",
      "emerald-nfa",
      "rank-ready"
    ];

    const VALID_SORT_MODES = [
      "default",
      "low-high",
      "high-low"
    ];


    /* =====================================================
       ELEMENTS
       ===================================================== */

    const productGrid =
      document.getElementById("productGrid");

    const searchInput =
      document.getElementById("searchInput");

    const resultsCount =
      document.getElementById("resultsCount");

    const clearFiltersButton =
      document.getElementById("clearFiltersButton");

    const categoryButtons =
      document.querySelectorAll("[data-filter]");

    const sortButtons =
      document.querySelectorAll("[data-sort]");


    /* =====================================================
       STATE
       ===================================================== */

    let currentCategory = "all";
    let currentSort = "default";
    let currentSearch = "";
    let shopReady = false;


    /* =====================================================
       CONTROLS
       ===================================================== */

    function setControlsEnabled(enabled) {
      searchInput.disabled = !enabled;

      categoryButtons.forEach(button => {
        button.disabled = !enabled;
      });

      sortButtons.forEach(button => {
        button.disabled = !enabled;
      });
    }


    /* =====================================================
       URL STATE
       ===================================================== */

    function readStateFromURL() {
      const params = new URLSearchParams(
        window.location.search
      );

      const requestedCategory =
        params.get("category") || "all";

      const requestedSort =
        params.get("sort") || "default";

      const requestedSearch =
        params.get("q") || "";

      currentCategory =
        VALID_CATEGORIES.includes(requestedCategory)
          ? requestedCategory
          : "all";

      currentSort =
        VALID_SORT_MODES.includes(requestedSort)
          ? requestedSort
          : "default";

      currentSearch =
        requestedSearch.trim();

      searchInput.value =
        currentSearch;
    }

    function updateURL() {
      const params =
        new URLSearchParams();

      if (currentCategory !== "all") {
        params.set(
          "category",
          currentCategory
        );
      }

      if (currentSort !== "default") {
        params.set(
          "sort",
          currentSort
        );
      }

      if (currentSearch.trim()) {
        params.set(
          "q",
          currentSearch.trim()
        );
      }

      const queryString =
        params.toString();

      const newURL =
        queryString
          ? `${window.location.pathname}?${queryString}`
          : window.location.pathname;

      window.history.replaceState(
        {
          category: currentCategory,
          sort: currentSort,
          search: currentSearch
        },
        "",
        newURL
      );
    }


    /* =====================================================
       FILTERING
       ===================================================== */

    function getFilteredProducts() {
      let products = [...PRODUCTS];

      if (currentCategory !== "all") {
        products = products.filter(product => {
          return product.category === currentCategory;
        });
      }

      const normalizedSearch =
        currentSearch
          .trim()
          .toLowerCase();

      if (normalizedSearch) {
        products = products.filter(product => {
          return getProductSearchText(product)
            .includes(normalizedSearch);
        });
      }

      if (currentSort === "low-high") {
        products.sort((a, b) => {
          return Number(a.price) - Number(b.price);
        });
      }

      if (currentSort === "high-low") {
        products.sort((a, b) => {
          return Number(b.price) - Number(a.price);
        });
      }

      return products;
    }


    /* =====================================================
       RESULTS TEXT
       ===================================================== */

    function updateResultsCount(products) {
      const count =
        products.length;

      const categoryText =
        currentCategory === "all"
          ? "all categories"
          : getCategoryLabel(currentCategory);

      const trimmedSearch =
        currentSearch.trim();

      if (trimmedSearch) {
        resultsCount.textContent =
          `${count} result${count === 1 ? "" : "s"} ` +
          `for “${trimmedSearch}” in ${categoryText}.`;

        return;
      }

      resultsCount.textContent =
        `${count} product${count === 1 ? "" : "s"} ` +
        `in ${categoryText}.`;
    }


    /* =====================================================
       ACTIVE BUTTON STATES
       ===================================================== */

    function updateCategoryButtons() {
      categoryButtons.forEach(button => {
        const isActive =
          button.dataset.filter === currentCategory;

        button.classList.toggle(
          "active",
          isActive
        );

        button.setAttribute(
          "aria-pressed",
          String(isActive)
        );
      });
    }

    function updateSortButtons() {
      sortButtons.forEach(button => {
        const isActive =
          button.dataset.sort === currentSort;

        button.classList.toggle(
          "active",
          isActive
        );

        button.setAttribute(
          "aria-pressed",
          String(isActive)
        );
      });
    }


    /* =====================================================
       CLEAR FILTER BUTTON
       ===================================================== */

    function updateClearFiltersButton() {
      const filtersAreActive =
        currentCategory !== "all" ||
        currentSort !== "default" ||
        currentSearch.trim() !== "";

      clearFiltersButton.hidden =
        !filtersAreActive;
    }


    /* =====================================================
       ERROR STATE
       ===================================================== */

    function renderLoadError() {
      resultsCount.textContent =
        "Products could not be loaded.";

      clearFiltersButton.hidden = true;

      productGrid.innerHTML = `
        <section class="empty-state">

          <p class="empty-state-kicker">
            Something went wrong
          </p>

          <h2>
            The shop did not load.
          </h2>

          <p>
            Check the database connection and try refreshing the page.
          </p>

          <button
            class="button-secondary"
            type="button"
            onclick="window.location.reload()"
          >
            Try again
          </button>

        </section>
      `;

      productGrid.setAttribute(
        "aria-busy",
        "false"
      );
    }


    /* =====================================================
       RENDER
       ===================================================== */

    function renderShop(options = {}) {
      if (!shopReady) {
        return;
      }

      const {
        updateAddress = true
      } = options;

      productGrid.setAttribute(
        "aria-busy",
        "true"
      );

      const products =
        getFilteredProducts();

      renderProductGrid(
        productGrid,
        products,
        {
          showCategory: true,
          showStock: true,
          showBadge: true,
          showMeta: true
        }
      );

      updateCategoryButtons();
      updateSortButtons();
      updateResultsCount(products);
      updateClearFiltersButton();

      if (updateAddress) {
        updateURL();
      }

      productGrid.setAttribute(
        "aria-busy",
        "false"
      );
    }


    /* =====================================================
       EVENTS
       ===================================================== */

    categoryButtons.forEach(button => {
      button.addEventListener(
        "click",
        () => {
          if (!shopReady) {
            return;
          }

          currentCategory =
            button.dataset.filter;

          renderShop();
        }
      );
    });

    sortButtons.forEach(button => {
      button.addEventListener(
        "click",
        () => {
          if (!shopReady) {
            return;
          }

          currentSort =
            button.dataset.sort;

          renderShop();
        }
      );
    });

    searchInput.addEventListener(
      "input",
      event => {
        if (!shopReady) {
          return;
        }

        currentSearch =
          event.target.value;

        renderShop();
      }
    );

    clearFiltersButton.addEventListener(
      "click",
      () => {
        if (!shopReady) {
          return;
        }

        currentCategory = "all";
        currentSort = "default";
        currentSearch = "";

        searchInput.value = "";

        renderShop();
        searchInput.focus();
      }
    );

    window.addEventListener(
      "popstate",
      () => {
        if (!shopReady) {
          return;
        }

        readStateFromURL();

        renderShop({
          updateAddress: false
        });
      }
    );


    /* =====================================================
       DATABASE UPDATES
       ===================================================== */

    window.addEventListener(
      "sunq:productsloaded",
      () => {
        if (!shopReady) {
          return;
        }

        renderShop({
          updateAddress: false
        });
      }
    );


    /* =====================================================
       INITIALIZE
       ===================================================== */

    async function initializeShop() {
      updateCartCount();
      readStateFromURL();
      setControlsEnabled(false);

      try {
        await productsReady;

        if (
          getProductsLoadError() ||
          !areProductsLoaded()
        ) {
          renderLoadError();
          return;
        }

        shopReady = true;

        setControlsEnabled(true);

        renderShop({
          updateAddress: false
        });
      } catch (error) {
        console.error(
          "Could not initialize the SUNQ shop:",
          error
        );

        renderLoadError();
      }
    }

    initializeShop();
  </script>

</body>
</html>
