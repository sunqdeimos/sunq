<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | SUNQ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <script src="data.js"></script>
  <script src="store-ui.js"></script>
</head>

<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">SUNQ</a>

      <div class="nav-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
      </div>
    </div>
  </nav>

  <main class="shop">

    <h1 class="page-title">Shop</h1>
<input
  type="text"
  id="searchInput"
  placeholder="Search products..."
  class="search-bar"
/>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', event)">All</button>
      <button class="filter-btn" onclick="setFilter('sunq', event)">SUNQ</button>
      <button class="filter-btn" onclick="setFilter('diamond', event)">Diamond / Champ FA</button>
    </div>

    <div id="shop-grid"></div>

  </main>

  <script>
    updateCartCount();

    const diamondSet = ["s1","s2","s3"];
    const sunqSet = ["s4","s5","s6","s7","s8","s9","s10"];

    function setFilter(type, e) {
      let products = Object.values(PRODUCTS);

      if (type === "diamond") {
        products = products.filter(p => diamondSet.includes(p.id));
      }

      if (type === "sunq") {
        products = products.filter(p => sunqSet.includes(p.id));
      }

      renderGrid("shop-grid", products);

      document.querySelectorAll(".filter-btn")
        .forEach(b => b.classList.remove("active"));

      e.target.classList.add("active");
    }

    renderGrid("shop-grid", Object.values(PRODUCTS));

    window.addEventListener("storage", updateCartCount);
  </script>

</body>
</html>
