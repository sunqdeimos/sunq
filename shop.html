<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUNQS MARKET</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">SUNQ</a>

      <div class="nav-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
      </div>
    </div>
  </nav>

  <main class="shop">

    <h1 class="page-title">SUNQS MARKET</h1>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all')">All</button>
      <button class="filter-btn" onclick="setFilter('sunq')">SUNQ</button>
      <button class="filter-btn" onclick="setFilter('jet')">JET</button>
    </div>

    <div id="product-grid" class="grid"></div>

  </main>

  <script>
    // ================= CART =================
    function getCart() {
      return JSON.parse(localStorage.getItem("sunqCart")) || [];
    }

    function updateCartCount() {
      const cart = getCart();
      const total = cart.reduce((sum, i) => sum + i.quantity, 0);
      const el = document.getElementById("cart-count");
      if (el) el.textContent = total;
    }

    updateCartCount();

    // ================= PRODUCTS =================
    const PRODUCTS = [
      // SUNQ
      { id: "s1", name: "SUNQ Alpha", price: 29.99, category: "sunq" },
      { id: "s2", name: "SUNQ Nova", price: 39.99, category: "sunq" },
      { id: "s3", name: "SUNQ Core", price: 24.99, category: "sunq" },
      { id: "s4", name: "SUNQ Pulse", price: 44.99, category: "sunq" },
      { id: "s5", name: "SUNQ Edge", price: 59.99, category: "sunq" },

      // JET
      { id: "j1", name: "JET Strike", price: 34.99, category: "jet" },
      { id: "j2", name: "JET Velocity", price: 49.99, category: "jet" },
      { id: "j3", name: "JET Flux", price: 27.99, category: "jet" },
      { id: "j4", name: "JET Aero", price: 64.99, category: "jet" },
      { id: "j5", name: "JET Prime", price: 79.99, category: "jet" }
    ];

    let currentFilter = "all";
    const grid = document.getElementById("product-grid");

    function renderProducts() {
      let filtered = PRODUCTS;

      if (currentFilter !== "all") {
        filtered = PRODUCTS.filter(p => p.category === currentFilter);
      }

      grid.innerHTML = filtered.map(p => `
        <div class="card fade">
          <div class="card-image"></div>
          <h3>${p.name}</h3>
          <p>$${p.price}</p>
          <a class="button-primary" href="product.html?id=${p.id}">
            View
          </a>
        </div>
      `).join("");
    }

    function setFilter(filter) {
      currentFilter = filter;

      document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.classList.remove("active");
      });

      event.target.classList.add("active");

      renderProducts();
    }

    renderProducts();
  </script>

</body>
</html>
