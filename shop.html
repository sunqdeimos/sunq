<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUNQS MARKET</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">SUNQ</a>

      <div class="nav-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
      </div>
    </div>
  </nav>

  <main class="shop">

    <h1 class="page-title">SUNQS MARKET</h1>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all')">All</button>
      <button class="filter-btn" onclick="setFilter('a')">Item A</button>
      <button class="filter-btn" onclick="setFilter('b')">Item B</button>
      <button class="filter-btn" onclick="setFilter('c')">Item C</button>
      <button class="filter-btn" onclick="setFilter('d')">Item D</button>
    </div>

    <div id="product-grid" class="grid"></div>

  </main>

  <script>
    const PRODUCTS = [
      { id: "a", name: "Item A", price: 29.99 },
      { id: "b", name: "Item B", price: 49.99 },
      { id: "c", name: "Item C", price: 19.99 },
      { id: "d", name: "Item D", price: 99.99 }
    ];

    let currentFilter = "all";

    const grid = document.getElementById("product-grid");

    function renderProducts() {
      let filtered = PRODUCTS;

      if (currentFilter !== "all") {
        filtered = PRODUCTS.filter(p => p.id === currentFilter);
      }

      grid.innerHTML = filtered.map(p => `
        <div class="card fade">
          <div class="card-image"></div>
          <h3>${p.name}</h3>
          <p>$${p.price}</p>
          <a class="button-primary" href="product.html?id=${p.id}">
            View
          </a>
        </div>
      `).join("");
    }

    function setFilter(filter) {
      currentFilter = filter;

      document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.classList.remove("active");
      });

      event.target.classList.add("active");

      renderProducts();
    }

    renderProducts();
  </script>

</body>
</html>
