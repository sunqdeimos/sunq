<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUNQS MARKET</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">SUNQ</a>

      <div class="nav-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
      </div>
    </div>
  </nav>

  <main class="shop">

    <h1 class="page-title">Shop</h1>

    <!-- PRODUCTS GRID -->
    <div id="product-grid" class="grid"></div>

  </main>

  <script>
    // CART COUNTER
    function getCart() {
      return JSON.parse(localStorage.getItem("sunqCart")) || [];
    }

    function updateCartCount() {
      const cart = getCart();
      const total = cart.reduce((sum, item) => sum + item.quantity, 0);
      const el = document.getElementById("cart-count");
      if (el) el.textContent = total;
    }

    updateCartCount();
    window.addEventListener("storage", updateCartCount);

    // PRODUCT DATA (temporary safe version)
    const PRODUCTS = [
      { id: "a", name: "Item A", price: 29.99 },
      { id: "b", name: "Item B", price: 49.99 },
      { id: "c", name: "Item C", price: 19.99 },
      { id: "d", name: "Item D", price: 99.99 }
    ];

    const grid = document.getElementById("product-grid");

    grid.innerHTML = PRODUCTS.map(p => `
      <div class="card">
        <div class="card-image"></div>
        <h3>${p.name}</h3>
        <p>$${p.price}</p>
        <a class="button-primary" href="product.html?id=${p.id}">
          View
        </a>
      </div>
    `).join("");
  </script>

</body>
</html>
