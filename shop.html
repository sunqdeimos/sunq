<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop | SUNQ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
  <script src="data.js"></script>
</head>

<body>

  <!-- NAV -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">SUNQ</a>

      <div class="nav-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
      </div>
    </div>
  </nav>

  <main class="shop">

    <h1 class="page-title">Shop</h1>

    <!-- SEARCH -->
    <input
      type="text"
      id="searchInput"
      class="search-bar"
      placeholder="Search products..."
    />

    <!-- FILTERS -->
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all', event)">All</button>
      <button class="filter-btn" onclick="setFilter('sunq', event)">SUNQ</button>
      <button class="filter-btn" onclick="setFilter('diamond', event)">Diamond / Champ FA</button>
    </div>

    <!-- PRODUCT GRID -->
    <div class="grid" id="productGrid"></div>

  </main>

  <!-- CART COUNT -->
  <script>
    function getCart() {
      return JSON.parse(localStorage.getItem("sunqCart")) || [];
    }

    function updateCartCount() {
      const cart = getCart();
      const total = cart.reduce((sum, i) => sum + i.quantity, 0);
      const el = document.getElementById("cart-count");
      if (el) el.textContent = total;
    }

    updateCartCount();
    window.addEventListener("storage", updateCartCount);
  </script>

  <!-- SHOP LOGIC -->
  <script>
    const diamondSet = ["s1","s2","s3"];
    const sunqSet = ["s4","s5","s6","s7","s8","s9","s10"];

    let currentFilter = "all";
    let searchQuery = "";

    const grid = document.getElementById("productGrid");

    function getFilteredProducts() {
      let products = Object.values(PRODUCTS);

      // category filter
      if (currentFilter === "diamond") {
        products = products.filter(p => diamondSet.includes(p.id));
      }

      if (currentFilter === "sunq") {
        products = products.filter(p => sunqSet.includes(p.id));
      }

      // search filter
      if (searchQuery.trim() !== "") {
        const q = searchQuery.toLowerCase();
        products = products.filter(p =>
          p.name.toLowerCase().includes(q)
        );
      }

      return products;
    }

    function renderProducts() {
      const products = getFilteredProducts();

      if (!products.length) {
        grid.innerHTML = `
          <div class="card" style="padding:20px;">
            <h3>No products found</h3>
          </div>
        `;
        return;
      }

      grid.innerHTML = products.map(p => `
        <a class="card fade" href="product.html?id=${p.id}">
          <div class="card-image"></div>
          <h3>${p.name}</h3>
          <p>$${p.price}</p>
        </a>
      `).join("");
    }

    function setFilter(type, e) {
      currentFilter = type;

      document.querySelectorAll(".filter-btn")
        .forEach(b => b.classList.remove("active"));

      if (e && e.target) e.target.classList.add("active");

      renderProducts();
    }

    document.getElementById("searchInput").addEventListener("input", (e) => {
      searchQuery = e.target.value;
      renderProducts();
    });

    renderProducts();

    window.addEventListener("storage", updateCartCount);
  </script>

</body>
</html>
