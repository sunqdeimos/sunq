<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - SUNQS MARKET</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter, Arial;
  background:radial-gradient(circle at top,#111 0%, #070707 50%, #050505 100%);
  color:#fff;
  opacity:0;
  transition:0.6s ease;
  overflow-x:hidden;
}

body.loaded{opacity:1;}

header{
  padding:18px 22px;
  border-bottom:1px solid rgba(255,204,51,0.15);
  position:sticky;
  top:0;
  background:rgba(5,5,5,0.85);
  backdrop-filter:blur(10px);
  z-index:100;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.navlink{
  color:#ffcc33;
  text-decoration:none;
  margin-right:14px;
  font-weight:500;
  transition:0.2s ease;
}

.navlink:hover{
  opacity:0.7;
  transform:translateY(-2px);
}

.toggle{
  display:flex;
  gap:10px;
}

.toggle button{
  padding:10px 14px;
  border-radius:14px;
  font-weight:600;
  cursor:pointer;
  border:1px solid rgba(255,204,51,0.4);
  background:rgba(255,255,255,0.03);
  color:#ffcc33;
  transition:0.25s ease;
}

.toggle button:hover{
  transform:translateY(-2px);
  border-color:#ffcc33;
}

.toggle button.active{
  background:linear-gradient(135deg,#ffcc33,#ffae00);
  color:#000;
  border:none;
}

.page-title{
  max-width:1100px;
  margin:0 auto;
  padding:45px 20px 15px;
  position:relative;
}

.page-title h1{
  margin:0;
  font-size:30px;
  color:#ffcc33;
  letter-spacing:2px;
}

.page-title p{
  margin-top:10px;
  color:#aaa;
  line-height:1.6;
}

.glow{
  position:absolute;
  width:500px;
  height:500px;
  background:radial-gradient(circle,rgba(255,204,51,0.12),transparent 65%);
  top:-250px;
  left:50%;
  transform:translateX(-50%);
  filter:blur(25px);
  z-index:-1;
  animation:floatGlow 8s ease-in-out infinite;
}

@keyframes floatGlow{
  0%{transform:translateX(-50%) translateY(0px);}
  50%{transform:translateX(-50%) translateY(35px);}
  100%{transform:translateX(-50%) translateY(0px);}
}

.grid{
  max-width:1100px;
  margin:0 auto;
  padding:25px 20px 70px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:22px;
}

.card{
  background:linear-gradient(145deg,#111,#080808);
  border:1px solid rgba(255,204,51,0.18);
  border-radius:20px;
  overflow:hidden;
  cursor:pointer;
  transition:0.25s ease;
  min-height:360px;
  display:flex;
  flex-direction:column;
}

.card:hover{
  transform:translateY(-12px) scale(1.02);
  border-color:rgba(255,204,51,0.55);
  box-shadow:0 20px 55px rgba(255,204,51,0.16);
}

.img{
  height:190px;
  background:#0f0f0f;
  border-bottom:1px solid rgba(255,204,51,0.1);
}

.img img{
  width:100%;
  height:190px;
  object-fit:cover;
  display:block;
}

.content{
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:10px;
  flex:1;
}

.title{
  font-size:20px;
  font-weight:700;
  letter-spacing:1px;
}

.desc{
  color:#aaa;
  font-size:14px;
  line-height:1.5;
}

.price{
  margin-top:auto;
  color:#ffcc33;
  font-size:22px;
  font-weight:800;
}

.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  color:#000;
  background:linear-gradient(135deg,#ffcc33,#ffae00);
  width:max-content;
}

.footer{
  padding:40px 20px;
  border-top:1px solid rgba(255,204,51,0.12);
  text-align:center;
  color:#777;
  font-size:13px;
}
</style>
</head>

<body>

<header>
  <div>
    <a class="navlink" href="index.html">Home</a>
    <a class="navlink" href="shop.html">Shop</a>
    <a class="navlink" href="about.html">About</a>
  </div>

  <div class="toggle">
    <button id="btnSunqs" onclick="setSide('sunqs')">SUNQS</button>
    <button id="btnJets" onclick="setSide('jets')">JETS</button>
  </div>
</header>

<div class="page-title">
  <div class="glow"></div>
  <h1 id="collectionTitle">SUNQS COLLECTION</h1>
  <p id="collectionDesc">Browse premium digital listings in the SUNQS category.</p>
</div>

<div id="grid" class="grid"></div>

<div class="footer">
  © SUNQS MARKET • W.I.P online marketplace
</div>

<script>
window.onload=()=>{document.body.classList.add("loaded");setSide("sunqs");};

const products={
  sunqs:[
    {id:1,name:"SUNQS A",price:"$10",img:"images/sunqs-a.jpg",desc:"Entry-level listing for quick purchase."},
    {id:2,name:"SUNQS B",price:"$15",img:"images/sunqs-b.jpg",desc:"Mid-tier listing with added value."},
    {id:3,name:"SUNQS C",price:"$20",img:"images/sunqs-c.jpg",desc:"Standard premium product listing."},
    {id:4,name:"SUNQS D",price:"$25",img:"images/sunqs-d.jpg",desc:"Higher-tier digital bundle listing."},
    {id:5,name:"SUNQS E",price:"$30",img:"images/sunqs-e.jpg",desc:"Exclusive premium listing category."},
    {id:6,name:"SUNQS F",price:"$35",img:"images/sunqs-f.jpg",desc:"High-demand product listing."},
    {id:7,name:"SUNQS G",price:"$40",img:"images/sunqs-g.jpg",desc:"Advanced listing with extra perks."},
    {id:8,name:"SUNQS H",price:"$45",img:"images/sunqs-h.jpg",desc:"Top-tier premium listing slot."}
  ],
  jets:[
    {id:101,name:"JETS A",price:"$12",img:"images/jets-a.jpg",desc:"Starter listing from the JETS lineup."},
    {id:102,name:"JETS B",price:"$18",img:"images/jets-b.jpg",desc:"Upgraded listing with more features."},
    {id:103,name:"JETS C",price:"$22",img:"images/jets-c.jpg",desc:"Balanced mid-tier JETS product."},
    {id:104,name:"JETS D",price:"$28",img:"images/jets-d.jpg",desc:"Higher tier listing with more demand."},
    {id:105,name:"JETS E",price:"$33",img:"images/jets-e.jpg",desc:"Premium high-tier JETS listing."},
    {id:106,name:"JETS F",price:"$40",img:"images/jets-f.jpg",desc:"Top quality premium digital listing."},
    {id:107,name:"JETS G",price:"$48",img:"images/jets-g.jpg",desc:"Rare listing slot with extra value."},
    {id:108,name:"JETS H",price:"$55",img:"images/jets-h.jpg",desc:"Ultra tier listing reserved for top buyers."}
  ]
};

function setSide(side){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  document.getElementById("btnSunqs").classList.remove("active");
  document.getElementById("btnJets").classList.remove("active");

  if(side==="sunqs"){
    document.getElementById("btnSunqs").classList.add("active");
    document.getElementById("collectionTitle").innerText="SUNQS COLLECTION";
    document.getElementById("collectionDesc").innerText="Browse premium digital listings in the SUNQS category.";
  }else{
    document.getElementById("btnJets").classList.add("active");
    document.getElementById("collectionTitle").innerText="JETS COLLECTION";
    document.getElementById("collectionDesc").innerText="Browse premium digital listings in the JETS category.";
  }

  products[side].forEach((p,i)=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="img">
        <img src="${p.img}">
      </div>

      <div class="content">
        ${i===0 ? `<div class="badge">FEATURED</div>` : ``}
        <div class="title">${p.name}</div>
        <div class="desc">${p.desc}</div>
        <div class="price">${p.price}</div>
      </div>
    `;

    div.onclick=()=>location.href="product.html?item="+p.id;
    grid.appendChild(div);
  });
}
</script>

</body>
</html>
