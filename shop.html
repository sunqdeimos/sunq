<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop - SUNQS MARKET</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#ffcc33;
  --gold2:#ffae00;
  --gold3:#ffd86a;
  --dark:#050505;
  --panel:rgba(5,5,5,0.72);
  --border:rgba(255,204,51,0.20);
}

body{
  margin:0;
  font-family:Inter, Arial;
  color:#fff;

  background:
    linear-gradient(to bottom, rgba(0,0,0,0.75), rgba(0,0,0,0.93)),
    url("images/gold-bg.jpg");

  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  opacity:0;
  transition:0.6s ease;
  overflow-x:hidden;
}

body.loaded{opacity:1;}

header{
  padding:18px 22px;
  border-bottom:1px solid rgba(255,204,51,0.15);
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(14px);
  z-index:100;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.navlink{
  color:var(--gold3);
  text-decoration:none;
  margin-right:14px;
  font-weight:600;
  transition:0.2s ease;
}

.navlink:hover{
  color:var(--gold2);
  text-shadow:0 0 18px rgba(255,204,51,0.5);
}

.toggle{
  display:flex;
  gap:10px;
}

.toggle button{
  padding:10px 14px;
  border-radius:16px;
  font-weight:800;
  cursor:pointer;
  border:1px solid rgba(255,204,51,0.45);
  background:rgba(0,0,0,0.45);
  color:var(--gold3);
  transition:0.25s ease;
  font-family:Inter, Arial;
}

.toggle button:hover{
  transform:translateY(-2px);
  border-color:var(--gold3);
}

.toggle button.active{
  background:linear-gradient(135deg,var(--gold3),var(--gold2));
  color:#000;
  border:none;
  box-shadow:0 15px 55px rgba(255,204,51,0.18);
}

.page-title{
  max-width:1100px;
  margin:0 auto;
  padding:50px 20px 10px;
}

.page-title h1{
  margin:0;
  font-size:32px;
  color:var(--gold3);
  letter-spacing:3px;
  text-shadow:0 0 20px rgba(255,204,51,0.2);
}

.page-title p{
  margin-top:10px;
  color:#ddd;
  line-height:1.6;
}

.grid{
  max-width:1100px;
  margin:0 auto;
  padding:30px 20px 80px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(290px,1fr));
  gap:22px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:22px;
  overflow:hidden;
  cursor:pointer;
  transition:0.25s ease;
  min-height:390px;
  display:flex;
  flex-direction:column;
  backdrop-filter:blur(12px);
}

.card:hover{
  transform:translateY(-12px) scale(1.02);
  border-color:rgba(255,204,51,0.6);
  box-shadow:0 22px 70px rgba(255,204,51,0.20);
}

.img{
  height:200px;
  background:#000;
  border-bottom:1px solid rgba(255,204,51,0.12);
}

.img img{
  width:100%;
  height:200px;
  object-fit:cover;
  display:block;
}

.content{
  padding:18px;
  display:flex;
  flex-direction:column;
  gap:10px;
  flex:1;
}

.badge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  color:#000;
  background:linear-gradient(135deg,var(--gold3),var(--gold2));
  width:max-content;
}
