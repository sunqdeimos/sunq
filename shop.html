<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHOP</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#070707;
  color:#fff;
  opacity:0;
  transition:0.6s ease;
}
body.loaded{opacity:1;}

header{
  padding:20px;
  border-bottom:1px solid #333;
  position:sticky;
  top:0;
  background:#070707;
  z-index:100;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.navlink{
  color:#ffcc33;
  text-decoration:none;
  margin-right:12px;
}

.navlink:hover{opacity:0.7;}

.toggle button{
  padding:8px 12px;
  background:#111;
  border:1px solid #ffcc33;
  color:#ffcc33;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:22px;
  padding:25px;
}

.card{
  background:#111;
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:0.25s;
  min-height:320px;
  display:flex;
  flex-direction:column;
}

.card:hover{
  transform:translateY(-12px) scale(1.03);
  box-shadow:0 20px 50px rgba(255,204,51,0.2);
}

.img img{
  width:100%;
  height:160px;
  object-fit:cover;
}

.content{
  padding:16px;
}

.title{font-size:22px;font-weight:bold;}
.price{color:#ffcc33;font-size:20px;}
</style>
</head>

<body>

<header>
  <div>
    <a class="navlink" href="index.html">Home</a>
    <a class="navlink" href="shop.html">Shop</a>
    <a class="navlink" href="about.html">About</a>
  </div>

  <div class="toggle">
    <button onclick="setSide('sunqs')">SUNQS</button>
    <button onclick="setSide('jets')">JETS</button>
  </div>
</header>

<div id="grid" class="grid"></div>

<script>
window.onload=()=>{document.body.classList.add("loaded");setSide("sunqs");};
const products={
  sunqs:[
    {id:1,name:"SUNQS A",price:"$10",img:"images/sunqs-a.jpg"},
    {id:2,name:"SUNQS B",price:"$15",img:"images/sunqs-b.jpg"},
    {id:3,name:"SUNQS C",price:"$20",img:"images/sunqs-c.jpg"},
    {id:4,name:"SUNQS D",price:"$25",img:"images/sunqs-d.jpg"},
    {id:5,name:"SUNQS E",price:"$30",img:"images/sunqs-e.jpg"},
    {id:6,name:"SUNQS F",price:"$35",img:"images/sunqs-f.jpg"},
    {id:7,name:"SUNQS G",price:"$40",img:"images/sunqs-g.jpg"},
    {id:8,name:"SUNQS H",price:"$45",img:"images/sunqs-h.jpg"}
  ],
  jets:[
    {id:101,name:"JETS A",price:"$12",img:"images/jets-a.jpg"},
    {id:102,name:"JETS B",price:"$18",img:"images/jets-b.jpg"},
    {id:103,name:"JETS C",price:"$22",img:"images/jets-c.jpg"},
    {id:104,name:"JETS D",price:"$28",img:"images/jets-d.jpg"},
    {id:105,name:"JETS E",price:"$33",img:"images/jets-e.jpg"},
    {id:106,name:"JETS F",price:"$40",img:"images/jets-f.jpg"},
    {id:107,name:"JETS G",price:"$48",img:"images/jets-g.jpg"},
    {id:108,name:"JETS H",price:"$55",img:"images/jets-h.jpg"}
  ]
};

function setSide(side){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  products[side].forEach(p=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <div class="img"><img src="${p.img}"></div>
      <div class="content">
        <div class="title">${p.name}</div>
        <div class="price">${p.price}</div>
      </div>
    `;

    div.onclick=()=>location.href="product.html?item="+p.id;
    grid.appendChild(div);
  });
}
</script>

</body>
</html>
