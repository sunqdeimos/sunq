<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | SUNQ</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">SUNQ</a>

      <div class="nav-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
      </div>
    </div>
  </nav>

  <main class="shop">
    <h1 class="page-title">Your Cart</h1>

    <div id="cart-container"></div>
  </main>

  <script>
    // ================= CART STORAGE =================
    function getCart() {
      return JSON.parse(localStorage.getItem("sunqCart")) || [];
    }

    function updateCartCount() {
      const cart = getCart();
      const total = cart.reduce((sum, i) => sum + i.quantity, 0);
      const el = document.getElementById("cart-count");
      if (el) el.textContent = total;
    }

    function saveCart(cart) {
      localStorage.setItem("sunqCart", JSON.stringify(cart));
      updateCartCount();
      renderCart();
    }

    // ================= PRODUCT DATABASE (SYNCED) =================
    const PRODUCTS = {
      s1: { id: "s1", name: "SUNQ A", price: 9.99 },
      s2: { id: "s2", name: "SUNQ B", price: 19.99 },
      s3: { id: "s3", name: "SUNQ C", price: 29.99 },
      s4: { id: "s4", name: "SUNQ D", price: 39.99 },
      s5: { id: "s5", name: "SUNQ E", price: 49.99 },

      j1: { id: "j1", name: "JET F", price: 9.99 },
      j2: { id: "j2", name: "JET G", price: 19.99 },
      j3: { id: "j3", name: "JET H", price: 29.99 },
      j4: { id: "j4", name: "JET I", price: 39.99 },
      j5: { id: "j5", name: "JET J", price: 49.99 }
    };

    // ================= RENDER CART =================
    const container = document.getElementById("cart-container");

    function renderCart() {
      const cart = getCart();

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="card" style="text-align:center;">
            <p>Your cart is empty.</p>
          </div>
        `;
        return;
      }

      let total = 0;

      container.innerHTML = cart.map(item => {
        const product = PRODUCTS[item.id];

        if (!product) {
          return `
            <div class="card">
              <p>Unknown item (ID: ${item.id})</p>
            </div>
          `;
        }

        const itemTotal = product.price * item.quantity;
        total += itemTotal;

        return `
          <div class="card">
            <h3>${product.name}</h3>
            <p>$${product.price} × ${item.quantity}</p>
            <p><strong>$${itemTotal.toFixed(2)}</strong></p>
          </div>
        `;
      }).join("");

      container.innerHTML += `
        <div class="card" style="margin-top: 20px;">
          <h2>Total: $${total.toFixed(2)}</h2>
        </div>
      `;
    }

    updateCartCount();
    renderCart();
  </script>

</body>
</html>
