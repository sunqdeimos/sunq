<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | SUNQ</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">SUNQ</a>

      <div class="nav-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
      </div>
    </div>
  </nav>

  <main class="shop">
    <h1 class="page-title">Your Cart</h1>

    <div id="cart-items"></div>

    <div id="cart-summary" style="text-align:center; margin-top:2rem;"></div>
  </main>

  <script>
    // -----------------------------
    // CART STORAGE (single source)
    // -----------------------------
    function getCart() {
      return JSON.parse(localStorage.getItem("sunqCart")) || [];
    }

    function saveCart(cart) {
      localStorage.setItem("sunqCart", JSON.stringify(cart));
      renderCart();
      updateCartCount();
    }

    function updateCartCount() {
      const cart = getCart();
      const total = cart.reduce((sum, i) => sum + i.quantity, 0);
      const el = document.getElementById("cart-count");
      if (el) el.textContent = total;
    }

    // -----------------------------
    // SINGLE PRODUCT SOURCE
    // (must match shop/product IDs)
    // -----------------------------
    const PRODUCTS = {
      a: { id: "a", name: "Item A", price: 29.99 },
      b: { id: "b", name: "Item B", price: 49.99 },
      c: { id: "c", name: "Item C", price: 19.99 },
      d: { id: "d", name: "Item D", price: 99.99 }
    };

    // -----------------------------
    // RENDER CART (SAFE VERSION)
    // -----------------------------
    function renderCart() {
      const cart = getCart();
      const container = document.getElementById("cart-items");
      const summary = document.getElementById("cart-summary");

      if (!container) return;

      if (cart.length === 0) {
        container.innerHTML = "<p>Your cart is empty.</p>";
        summary.innerHTML = "";
        return;
      }

      let total = 0;
      container.innerHTML = "";

      cart.forEach(item => {
        const product = PRODUCTS[item.id];

        // If product missing, still show it (no silent failure)
        if (!product) {
          container.innerHTML += `
            <div class="card">
              <h3>Unknown item</h3>
              <p>ID: ${item.id}</p>
              <button class="button-primary" onclick="removeItem('${item.id}')">
                Remove
              </button>
            </div>
          `;
          return;
        }

        const itemTotal = product.price * item.quantity;
        total += itemTotal;

        container.innerHTML += `
          <div class="card">
            <h3>${product.name}</h3>
            <p>$${product.price}</p>

            <div style="margin:10px 0;">
              <button onclick="changeQty('${item.id}', -1)">-</button>
              <span style="margin:0 10px;">${item.quantity}</span>
              <button onclick="changeQty('${item.id}', 1)">+</button>
            </div>

            <p>Total: $${itemTotal.toFixed(2)}</p>

            <button class="button-primary" onclick="removeItem('${item.id}')">
              Remove
            </button>
          </div>
        `;
      });

      summary.innerHTML = `<h2>Total: $${total.toFixed(2)}</h2>`;
    }

    // -----------------------------
    // CART ACTIONS
    // -----------------------------
    function changeQty(id, delta) {
      const cart = getCart();
      const item = cart.find(i => i.id === id);

      if (!item) return;

      item.quantity += delta;

      if (item.quantity <= 0) {
        const index = cart.findIndex(i => i.id === id);
        cart.splice(index, 1);
      }

      saveCart(cart);
    }

    function removeItem(id) {
      let cart = getCart();
      cart = cart.filter(i => i.id !== id);
      saveCart(cart);
    }

    // INIT
    updateCartCount();
    renderCart();
  </script>

</body>
</html>
