<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Cart | SUNQ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="styles.css">

  <!-- Supabase first -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Project connection -->
  <script src="supabase-config.js"></script>

  <!-- Product data and shared UI -->
  <script src="data.js"></script>
  <script src="store-ui.js"></script>
</head>

<body>

  <!-- ================= NAVBAR ================= -->

  <nav class="navbar">
    <div class="nav-container">

      <a
        href="index.html"
        class="logo"
      >
        SUNQ
      </a>

      <div class="nav-links">

        <a href="shop.html">
          Shop
        </a>

        <a href="about.html">
          About
        </a>

        <a
          href="cart.html"
          aria-current="page"
        >
          Cart (<span id="cart-count">0</span>)
        </a>

      </div>

    </div>
  </nav>


  <!-- ================= CART ================= -->

  <main class="shop">

    <header class="page-header">

      <h1 class="page-title">
        Your Cart
      </h1>

      <p class="page-intro">
        Review your items, adjust quantities, and make sure
        everything looks right before checkout.
      </p>

    </header>


    <div
      id="cart-container"
      aria-live="polite"
      aria-busy="true"
    >

      <section class="empty-state">

        <p class="empty-state-kicker">
          Loading
        </p>

        <h2>
          Checking your cart.
        </h2>

        <p>
          This should only take a moment.
        </p>

      </section>

    </div>

  </main>


  <!-- ================= TOAST ================= -->

  <div
    id="toast"
    class="toast"
    role="status"
    aria-live="polite"
    aria-atomic="true"
  ></div>


  <!-- ================= FOOTER ================= -->

  <footer class="site-footer">

    <div class="footer-inner">

      <div class="footer-brand">

        <a
          href="index.html"
          class="footer-logo"
        >
          SUNQ
        </a>

        <p>
          Built one listing at a time.
        </p>

      </div>

      <nav
        class="footer-links"
        aria-label="Footer navigation"
      >
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="cart.html">Cart</a>
      </nav>

      <p class="footer-copy">
        © 2026 SUNQ
      </p>

    </div>

  </footer>


  <!-- ================= CART LOGIC ================= -->

  <script>
    const cartContainer =
      document.getElementById("cart-container");

    let toastTimer;
    let checkoutComplete = false;
    let cartReady = false;


    /* =====================================================
       TOAST
       ===================================================== */

    function showToast(
      message,
      type = "success"
    ) {
      const toast =
        document.getElementById("toast");

      if (!toast) {
        return;
      }

      clearTimeout(toastTimer);

      toast.textContent = message;

      toast.className =
        `toast toast-${type} toast-visible`;

      toastTimer = setTimeout(() => {
        toast.classList.remove(
          "toast-visible"
        );
      }, 2400);
    }


    /* =====================================================
       QUANTITY ANIMATION
       ===================================================== */

    function animateQuantity(productId) {
      const quantityElement =
        document.querySelector(
          `[data-quantity="${productId}"]`
        );

      if (!quantityElement) {
        return;
      }

      quantityElement.classList.remove(
        "quantity-pop"
      );

      void quantityElement.offsetWidth;

      quantityElement.classList.add(
        "quantity-pop"
      );
    }


    /* =====================================================
       CLEAN INVALID CART ITEMS
       ===================================================== */

    function cleanCartAgainstCatalog() {
      const cart = getCart();

      const cleanCart = cart.filter(item => {
        return Boolean(getProduct(item.id));
      });

      if (cleanCart.length !== cart.length) {
        saveCart(cleanCart);
      }

      return cleanCart;
    }


    /* =====================================================
       CHANGE QUANTITY
       ===================================================== */

    function changeQuantity(
      productId,
      delta
    ) {
      if (!cartReady) {
        return;
      }

      checkoutComplete = false;

      const product =
        getProduct(productId);

      if (!product) {
        showToast(
          "This product is no longer available.",
          "error"
        );

        return;
      }

      const cart =
        getCart();

      const item =
        cart.find(cartItem => {
          return cartItem.id === productId;
        });

      if (!item) {
        return;
      }

      const currentQuantity =
        Number(item.quantity);

      const nextQuantity =
        currentQuantity + Number(delta);

      if (nextQuantity <= 0) {
        removeCartItem(productId);
        return;
      }

      const availableStock =
        getStock(productId);

      if (availableStock <= 0) {
        showToast(
          `${product.name} is unavailable.`,
          "error"
        );

        return;
      }

      if (nextQuantity > availableStock) {
        showToast(
          `Only ${availableStock} available.`,
          "error"
        );

        return;
      }

      item.quantity =
        nextQuantity;

      saveCart(cart);
      renderCart();

      requestAnimationFrame(() => {
        animateQuantity(productId);
      });
    }


    /* =====================================================
       REMOVE ITEM
       ===================================================== */

    function removeCartItem(productId) {
      if (!cartReady) {
        return;
      }

      checkoutComplete = false;

      const product =
        getProduct(productId);

      const cartItemElement =
        document.querySelector(
          `[data-cart-item="${productId}"]`
        );

      if (cartItemElement) {
        cartItemElement.classList.add(
          "cart-item-removing"
        );
      }

      setTimeout(() => {
        const updatedCart =
          getCart().filter(item => {
            return item.id !== productId;
          });

        saveCart(updatedCart);
        renderCart();

        showToast(
          product
            ? `${product.name} removed from your cart.`
            : "Item removed from your cart."
        );
      }, cartItemElement ? 260 : 0);
    }


    /* =====================================================
       CLEAR CART
       ===================================================== */

    function clearCart() {
      if (!cartReady) {
        return;
      }

      checkoutComplete = false;

      const cart =
        getCart();

      if (cart.length === 0) {
        showToast(
          "Your cart is already empty.",
          "error"
        );

        return;
      }

      const confirmed =
        window.confirm(
          "Remove every item from your cart?"
        );

      if (!confirmed) {
        return;
      }

      clearStoredCart();
      renderCart();

      showToast(
        "Your cart has been cleared."
      );
    }


    /* =====================================================
       DEMO CHECKOUT
       ===================================================== */

    function checkout() {
      if (!cartReady) {
        return;
      }

      const cart =
        cleanCartAgainstCatalog();

      if (cart.length === 0) {
        showToast(
          "Your cart is empty.",
          "error"
        );

        renderCart();
        return;
      }

      /*
        Validate all quantities against the current product
        stock returned by Supabase.

        Database stock is not changed here. That must happen
        through a protected server-side function.
      */

      for (const item of cart) {
        const product =
          getProduct(item.id);

        if (!product) {
          showToast(
            "One cart item is no longer available.",
            "error"
          );

          renderCart();
          return;
        }

        const availableStock =
          getStock(item.id);

        if (availableStock <= 0) {
          showToast(
            `${product.name} is unavailable.`,
            "error"
          );

          renderCart();
          return;
        }

        if (
          Number(item.quantity) >
          availableStock
        ) {
          showToast(
            `${product.name} only has ${availableStock} available.`,
            "error"
          );

          renderCart();
          return;
        }
      }

      checkoutComplete = true;

      clearStoredCart();
      renderCart();

      showToast(
        "Checkout demo complete."
      );
    }


    /* =====================================================
       CART ITEM MARKUP
       ===================================================== */

    function renderCartItem(
      item,
      index
    ) {
      const product =
        getProduct(item.id);

      if (!product) {
        return `
          <article
            class="cart-item cart-item-error fade"
            data-cart-item="${escapeHTML(item.id)}"
            style="animation-delay:${index * 55}ms;"
          >

            <div class="cart-item-main">

              <div>

                <p class="cart-item-category">
                  Unknown listing
                </p>

                <h2>
                  Item no longer available
                </h2>

                <p>
                  Product ID: ${escapeHTML(item.id)}
                </p>

              </div>

              <button
                class="remove-item-button"
                type="button"
                onclick="removeCartItem('${escapeHTML(item.id)}')"
              >
                Remove
              </button>

            </div>

          </article>
        `;
      }

      const stock =
        getStock(product.id);

      const itemQuantity =
        Math.max(
          1,
          Number(item.quantity)
        );

      const itemTotal =
        Number(product.price) *
        itemQuantity;

      const category =
        getCategoryLabel(
          product.category
        );

      const platform =
        getProductPlatform(product);

      const delivery =
        getProductDelivery(product);

      const stockClass =
        getStockClass(stock);

      const stockLabel =
        getStockLabel(stock);

      const plusDisabled =
        itemQuantity >= stock ||
        stock <= 0;

      return `
        <article
          class="cart-item fade"
          data-cart-item="${escapeHTML(product.id)}"
          style="animation-delay:${index * 55}ms;"
        >

          <!-- IMAGE -->

          <a
            class="cart-item-image-link"
            href="product.html?id=${encodeURIComponent(product.id)}"
            aria-label="View ${escapeHTML(product.name)}"
          >

            <img
              class="cart-item-image"
              src="${escapeHTML(getProductImage(product))}"
              alt="${escapeHTML(product.name)}"
              loading="lazy"
              onerror="
                this.onerror = null;
                this.src = 'https://placehold.co/800x800/111111/d4af37?text=SUNQ';
              "
            >

          </a>


          <!-- DETAILS -->

          <div class="cart-item-details">

            <p class="cart-item-category">
              ${escapeHTML(category)}
            </p>

            <a
              class="cart-item-name"
              href="product.html?id=${encodeURIComponent(product.id)}"
            >
              ${escapeHTML(product.name)}
            </a>

            <p class="cart-item-unit-price">
              ${formatPrice(product.price)} each
            </p>

            <div class="cart-item-meta">

              <span>
                ${escapeHTML(platform)}
              </span>

              <span>
                ${escapeHTML(delivery)}
              </span>

            </div>

            <p class="cart-item-stock ${escapeHTML(stockClass)}">
              ${escapeHTML(stockLabel)}
            </p>


            <!-- CONTROLS -->

            <div class="cart-item-actions">

              <div
                class="qty-row"
                aria-label="Quantity controls for ${escapeHTML(product.name)}"
              >

                <button
                  type="button"
                  onclick="changeQuantity('${escapeHTML(product.id)}', -1)"
                  aria-label="Decrease quantity"
                >
                  −
                </button>

                <span
                  data-quantity="${escapeHTML(product.id)}"
                  aria-live="polite"
                >
                  ${itemQuantity}
                </span>

                <button
                  type="button"
                  onclick="changeQuantity('${escapeHTML(product.id)}', 1)"
                  aria-label="Increase quantity"
                  ${plusDisabled ? "disabled" : ""}
                >
                  +
                </button>

              </div>

              <button
                class="remove-item-button"
                type="button"
                onclick="removeCartItem('${escapeHTML(product.id)}')"
              >
                Remove
              </button>

            </div>

          </div>


          <!-- TOTAL -->

          <div class="cart-item-total">

            <span>
              Item total
            </span>

            <strong>
              ${formatPrice(itemTotal)}
            </strong>

          </div>

        </article>
      `;
    }


    /* =====================================================
       EMPTY CART
       ===================================================== */

    function renderEmptyCart() {
      cartContainer.innerHTML = `
        <section class="empty-state cart-empty-state">

          <p class="empty-state-kicker">
            Your cart
          </p>

          <h2>
            I'm lonely. Give me a friend.
          </h2>

          <p>
            Add something from the shop and it will appear here.
          </p>

          <a
            class="button-primary empty-state-button"
            href="shop.html"
          >
            Browse the shop
          </a>

        </section>
      `;

      cartContainer.setAttribute(
        "aria-busy",
        "false"
      );
    }


    /* =====================================================
       CHECKOUT COMPLETE
       ===================================================== */

    function renderCheckoutComplete() {
      cartContainer.innerHTML = `
        <section class="checkout-complete">

          <div
            class="checkout-complete-icon"
            aria-hidden="true"
          >
            ✓
          </div>

          <p class="section-kicker">
            Demo checkout complete
          </p>

          <h2>
            Thank you for testing SUNQ.
          </h2>

          <p>
            No payment was processed and database stock
            was not changed.
          </p>

          <div class="checkout-complete-actions">

            <a
              class="button-primary"
              href="shop.html"
            >
              Continue shopping
            </a>

            <a
              class="button-secondary"
              href="index.html"
            >
              Return home
            </a>

          </div>

        </section>
      `;

      cartContainer.setAttribute(
        "aria-busy",
        "false"
      );
    }


    /* =====================================================
       DATABASE ERROR
       ===================================================== */

    function renderLoadError() {
      cartContainer.innerHTML = `
        <section class="empty-state">

          <p class="empty-state-kicker">
            Something went wrong
          </p>

          <h2>
            Your cart could not be checked.
          </h2>

          <p>
            Product information could not be loaded from the database.
          </p>

          <button
            class="button-secondary"
            type="button"
            onclick="window.location.reload()"
          >
            Try again
          </button>

        </section>
      `;

      cartContainer.setAttribute(
        "aria-busy",
        "false"
      );
    }


    /* =====================================================
       CART RENDER
       ===================================================== */

    function renderCart() {
      if (!cartReady) {
        return;
      }

      const cart =
        getCart();

      updateCartCount();

      if (checkoutComplete) {
        renderCheckoutComplete();
        return;
      }

      if (cart.length === 0) {
        renderEmptyCart();
        return;
      }

      let subtotal = 0;
      let totalItems = 0;

      cart.forEach(item => {
        const product =
          getProduct(item.id);

        if (!product) {
          return;
        }

        subtotal +=
          Number(product.price) *
          Number(item.quantity);

        totalItems +=
          Number(item.quantity);
      });

      const itemMarkup =
        cart
          .map((item, index) => {
            return renderCartItem(
              item,
              index
            );
          })
          .join("");

      cartContainer.innerHTML = `
        <div class="cart-layout">

          <!-- ITEMS -->

          <section
            class="cart-items"
            aria-label="Cart items"
          >
            ${itemMarkup}
          </section>


          <!-- SUMMARY -->

          <aside class="cart-summary">

            <p class="cart-summary-label">
              Order summary
            </p>

            <h2>
              ${totalItems}
              item${totalItems === 1 ? "" : "s"}
            </h2>

            <div class="summary-row">

              <span>
                Subtotal
              </span>

              <strong>
                ${formatPrice(subtotal)}
              </strong>

            </div>

            <div class="summary-row">

              <span>
                Delivery
              </span>

              <strong>
                Digital
              </strong>

            </div>

            <div class="summary-row summary-total">

              <span>
                Total
              </span>

              <strong>
                ${formatPrice(subtotal)}
              </strong>

            </div>

            <p class="summary-note">
              Payment processing and protected inventory
              updates are not connected yet.
            </p>

            <button
              class="button-primary checkout-button"
              type="button"
              onclick="checkout()"
            >
              Checkout demo
            </button>

            <a
              class="button-secondary continue-shopping-button"
              href="shop.html"
            >
              Continue shopping
            </a>

            <button
              class="clear-cart-button"
              type="button"
              onclick="clearCart()"
            >
              Clear cart
            </button>

          </aside>

        </div>
      `;

      cartContainer.setAttribute(
        "aria-busy",
        "false"
      );
    }


    /* =====================================================
       INITIALIZE
       ===================================================== */

    async function initializeCart() {
      updateCartCount();

      try {
        await productsReady;

        if (
          getProductsLoadError() ||
          !areProductsLoaded()
        ) {
          renderLoadError();
          return;
        }

        cartReady = true;

        cleanCartAgainstCatalog();
        renderCart();
      } catch (error) {
        console.error(
          "Could not initialize the cart:",
          error
        );

        renderLoadError();
      }
    }


    /* =====================================================
       CART UPDATES
       ===================================================== */

    window.addEventListener(
      "sunq:cartchange",
      () => {
        if (cartReady) {
          renderCart();
        }
      }
    );

    window.addEventListener(
      "sunq:externalchange",
      () => {
        checkoutComplete = false;

        if (cartReady) {
          renderCart();
        }
      }
    );


    /* =====================================================
       FUTURE PRODUCT REFRESH
       ===================================================== */

    window.addEventListener(
      "sunq:productsloaded",
      () => {
        if (!cartReady) {
          return;
        }

        checkoutComplete = false;
        cleanCartAgainstCatalog();
        renderCart();
      }
    );


    initializeCart();
  </script>

</body>
</html>
