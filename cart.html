<body>

<header>
  <a class="navlink" href="index.html">Home</a>
  <a class="navlink" href="shop.html">Shop</a>
  <a class="navlink" href="about.html">About</a>
  <a class="navlink" href="cart.html">Cart (<span id="cart-count">0</span>)</a>
</header>

<div class="page">
  <h1>Cart</h1>
  <div id="cart"></div>
</div>

<script>
function render(){
  const cart = getCart();
  const box = document.getElementById("cart");

  box.innerHTML = cart.map(i=>{
    const p = items[i.id];
    return `
      <div class="card">
        ${p.name} x ${i.quantity}
      </div>
    `;
  }).join("");
}

render();
updateCartUI();
</script>

</body>
