<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <a class="logo" href="index.html">SUNQ</a>
    <div class="nav-links">
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
    </div>
  </div>
</nav>

<div class="cart-page" id="cart"></div>

<script>
function getCart(){
  return JSON.parse(localStorage.getItem("sunqCart"))||[];
}

function render(){
  let cart=getCart();
  let html="";
  cart.forEach(i=>{
    html+=`<p>${i.id} x ${i.quantity}</p>`;
  });
  document.getElementById("cart").innerHTML=html || "Empty cart";
}

render();
</script>

</body>
</html>
