<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | SUNQ</title>

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <!-- PRODUCTS -->
  <script src="data.js"></script>
</head>

<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">SUNQ</a>

      <div class="nav-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
      </div>
    </div>
  </nav>

  <main class="shop">
    <h1 class="page-title">Your Cart</h1>

    <div id="cart-container"></div>
  </main>

  <script>
    function getCart() {
      return JSON.parse(localStorage.getItem("sunqCart")) || [];
    }

    function saveCart(cart) {
      localStorage.setItem("sunqCart", JSON.stringify(cart));
      updateCartCount();
      renderCart();
    }

    function updateCartCount() {
      const cart = getCart();
      const total = cart.reduce((sum, i) => sum + i.quantity, 0);
      const el = document.getElementById("cart-count");
      if (el) el.textContent = total;
    }

    function changeQty(id, delta) {
      let cart = getCart();
      const item = cart.find(i => i.id === id);

      if (!item) return;

      item.quantity += delta;

      if (item.quantity <= 0) {
        cart = cart.filter(i => i.id !== id);
      }

      saveCart(cart);
    }

    function clearCart() {
      localStorage.removeItem("sunqCart");
      updateCartCount();
      renderCart();
    }

    function checkout() {
      const cart = getCart();

      if (cart.length === 0) {
        alert("Your cart is empty.");
        return;
      }

      // Check stock first
      for (const item of cart) {
        const available = getStock(item.id);

        if (item.quantity > available) {
          alert(`Not enough stock for ${PRODUCTS[item.id].name}. Only ${available} left.`);
          return;
        }
      }

      // Reduce stock
      for (const item of cart) {
        reduceStock(item.id, item.quantity);
      }

      alert("Checkout complete! Stock updated.");
      clearCart();
    }

    function renderCart() {
      const container = document.getElementById("cart-container");
      const cart = getCart();

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="card" style="text-align:center; padding:25px;">
            <p>Your cart is empty.</p>
          </div>
        `;
        return;
      }

      let total = 0;

      const html = cart.map(item => {
        const product = PRODUCTS[item.id];

        if (!product) {
          return `
            <div class="card" style="padding:25px;">
              <p>Unknown item (ID: ${item.id})</p>
            </div>
          `;
        }

        const stockLeft = getStock(item.id);

        const itemTotal = product.price * item.quantity;
        total += itemTotal;

        return `
          <div class="card" style="padding:25px;">
            <h3>${product.name}</h3>
            <p>$${product.price}</p>

            <p style="opacity:0.7;">Stock left: ${stockLeft}</p>

            <div class="qty-row">
              <button onclick="changeQty('${item.id}', -1)">-</button>
              <span>${item.quantity}</span>
              <button onclick="changeQty('${item.id}', 1)">+</button>
            </div>

            <p><strong>$${itemTotal.toFixed(2)}</strong></p>
          </div>
        `;
      }).join("");

      container.innerHTML = `
        ${html}

        <div class="card" style="margin-top: 20px; padding:25px;">
          <h2>Total: $${total.toFixed(2)}</h2>

          <button class="button-primary" onclick="checkout()">
            Checkout
          </button>

          <button onclick="clearCart()" style="margin-top:10px; width:100%;">
            Clear Cart
          </button>
        </div>
      `;
    }

    updateCartCount();
    renderCart();
  </script>

</body>
</html>
