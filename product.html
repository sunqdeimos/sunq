<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product | SUNQ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">SUNQ</a>
            <div class="nav-links">
                <a href="shop.html">Shop</a>
                <a href="about.html">About</a>
                <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            </div>
        </div>
    </nav>

    <main class="product-page">
        <div class="product-container" id="product-container">
            <div class="loading">Loading product...</div>
        </div>
    </main>

    <script>
        // ---------- PRODUCT DATABASE ----------
        const items = {
            "sunqs-a": {
                id: "sunqs-a",
                name: "SUNQ Alpha Hoodie",
                collection: "SUNQS",
                price: 89.00,
                description: "Premium heavyweight hoodie with embroidered SUNQ logo.",
                image: "https://placehold.co/600x600/1a1a1a/gold?text=SUNQ+A",
                category: "sunqs"
            },
            "sunqs-b": {
                id: "sunqs-b",
                name: "SUNQ Essential Tee",
                collection: "SUNQS",
                price: 39.00,
                description: "Classic crewneck t-shirt, garment-dyed soft feel.",
                image: "https://placehold.co/600x600/1a1a1a/gold?text=SUNQ+B",
                category: "sunqs"
            },
            "sunqs-c": {
                id: "sunqs-c",
                name: "SUNQ Cargo Pants",
                collection: "SUNQS",
                price: 129.00,
                description: "Oversized cargo pants with multiple pockets.",
                image: "https://placehold.co/600x600/1a1a1a/gold?text=SUNQ+C",
                category: "sunqs"
            },
            "jets-a": {
                id: "jets-a",
                name: "JETS Varsity Jacket",
                collection: "JETS",
                price: 199.00,
                description: "Wool-blend varsity jacket with leather sleeves.",
                image: "https://placehold.co/600x600/1a1a1a/gold?text=JETS+A",
                category: "jets"
            },
            "jets-b": {
                id: "jets-b",
                name: "JETS Cap",
                collection: "JETS",
                price: 35.00,
                description: "Structured 6-panel cap with curved brim.",
                image: "https://placehold.co/600x600/1a1a1a/gold?text=JETS+B",
                category: "jets"
            },
            "jets-c": {
                id: "jets-c",
                name: "JETS Technical Trousers",
                collection: "JETS",
                price: 149.00,
                description: "Slim-fit trousers with water-repellent finish.",
                image: "https://placehold.co/600x600/1a1a1a/gold?text=JETS+C",
                category: "jets"
            }
        };

        // Helper: get URL parameter
        function getParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // Cart functions (using sunqCart key)
        function getCart() {
            const stored = localStorage.getItem('sunqCart');
            return stored ? JSON.parse(stored) : [];
        }

        function saveCart(cart) {
            localStorage.setItem('sunqCart', JSON.stringify(cart));
        }

        function addToCart(productId, quantity) {
            let cart = getCart();
            const existingIndex = cart.findIndex(item => item.id === productId);
            if (existingIndex !== -1) {
                cart[existingIndex].quantity += quantity;
            } else {
                cart.push({ id: productId, quantity: quantity });
            }
            saveCart(cart);
        }

        function updateCartCountDisplay() {
            const cart = getCart();
            let totalItems = 0;
            cart.forEach(item => { totalItems += item.quantity; });
            const countSpan = document.getElementById('cart-count');
            if (countSpan) countSpan.innerText = totalItems;
        }

        function showMessage(msg, type) {
            const msgDiv = document.getElementById('cart-message');
            if (msgDiv) {
                msgDiv.innerText = msg;
                msgDiv.className = `cart-message ${type}`;
                setTimeout(() => {
                    msgDiv.innerText = '';
                    msgDiv.className = 'cart-message';
                }, 3000);
            }
        }

        // Display product
        function displayProduct(productId) {
            const container = document.getElementById('product-container');
            const product = items[productId];

            if (!product) {
                container.innerHTML = `
                    <div class="product-error">
                        <h2>Product not found</h2>
                        <p>Sorry, the item you're looking for doesn't exist.</p>
                        <a href="shop.html" class="button-primary">Return to Shop</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="product-grid">
                    <div class="product-image">
                        <img src="${product.image}" alt="${product.name}">
                    </div>
                    <div class="product-details">
                        <div class="product-collection">${product.collection}</div>
                        <h1 class="product-title">${product.name}</h1>
                        <div class="product-price">$${product.price.toFixed(2)}</div>
                        <div class="product-description">${product.description}</div>
                        <div class="product-actions">
                            <label for="quantity">Quantity:</label>
                            <input type="number" id="quantity" name="quantity" value="1" min="1" max="10">
                            <button id="add-to-cart-btn" class="button-primary">Add to Cart</button>
                        </div>
                        <div id="cart-message" class="cart-message"></div>
                    </div>
                </div>
            `;

            const addButton = document.getElementById('add-to-cart-btn');
            const quantityInput = document.getElementById('quantity');
            
            addButton.addEventListener('click', () => {
                let quantity = parseInt(quantityInput.value);
                if (isNaN(quantity) || quantity < 1) quantity = 1;
                addToCart(product.id, quantity);
                showMessage(`${product.name} added to cart!`, 'success');
                updateCartCountDisplay();
            });
        }

        // Initialize page
        function init() {
            const itemId = getParam('item');
            if (itemId) {
                displayProduct(itemId);
            } else {
                document.getElementById('product-container').innerHTML = `
                    <div class="product-error">
                        <h2>No product selected</h2>
                        <p>Please go to the shop and choose an item.</p>
                        <a href="shop.html" class="button-primary">Visit Shop</a>
                    </div>
                `;
            }
            updateCartCountDisplay();
        }

        init();
    </script>

    <style>
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .product-image img {
            width: 100%;
            border-radius: 1rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.5);
        }
        .product-collection {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold, #D4AF37);
            margin-bottom: 0.5rem;
        }
        .product-title {
            font-size: 2.5rem;
            margin: 0.5rem 0;
        }
        .product-price {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 1rem 0;
            color: var(--gold, #D4AF37);
        }
        .product-description {
            line-height: 1.6;
            margin: 1rem 0 2rem 0;
            color: #ccc;
        }
        .product-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1rem 0;
        }
        .product-actions input {
            width: 70px;
            padding: 0.5rem;
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            border-radius: 0.5rem;
            text-align: center;
        }
        .button-primary {
            background: var(--gold, #D4AF37);
            color: #0a0a0a;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            font-weight: bold;
            cursor: pointer;
        }
        .cart-message {
            margin-top: 1rem;
            padding: 0.5rem;
            border-radius: 0.5rem;
        }
        .cart-message.success {
            background: #2c5e2c;
            color: #cdffcd;
        }
        .product-error {
            text-align: center;
            padding: 4rem 2rem;
        }
        @media (max-width: 768px) {
            .product-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }
        .navbar {
            background: rgba(10,10,10,0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            padding: 1rem 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gold, #D4AF37);
            text-decoration: none;
        }
        .nav-links a {
            color: white;
            margin-left: 2rem;
            text-decoration: none;
        }
        .nav-links a:hover {
            color: var(--gold, #D4AF37);
        }
    </style>
</body>
</html>
