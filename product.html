<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | SUNQ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <!-- MUST load first -->
  <script src="data.js"></script>
</head>

<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">SUNQ</a>

      <div class="nav-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
      </div>
    </div>
  </nav>

  <main class="shop">
    <div id="product-container"></div>
  </main>

  <script>
    /* ================= CART ================= */

    function getCart() {
      return JSON.parse(localStorage.getItem("sunqCart")) || [];
    }

    function saveCart(cart) {
      localStorage.setItem("sunqCart", JSON.stringify(cart));
      updateCartCount();
    }

    function updateCartCount() {
      const cart = getCart();
      const total = cart.reduce((sum, i) => sum + i.quantity, 0);
      const el = document.getElementById("cart-count");
      if (el) el.textContent = total;
    }

    /* ================= PRODUCT LOOKUP ================= */

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    function getProduct(id) {
      return PRODUCTS.find(p => p.id === id);
    }

    const product = getProduct(id);
    const container = document.getElementById("product-container");

    /* ================= STOCK ================= */

    function getStock(id) {
      const data = JSON.parse(localStorage.getItem("sunqStock")) || {};
      return data[id] ?? 0;
    }

    function reduceStock(id, amount) {
      const data = JSON.parse(localStorage.getItem("sunqStock")) || {};

      if (data[id] === undefined) return false;
      if (data[id] < amount) return false;

      data[id] -= amount;
      localStorage.setItem("sunqStock", JSON.stringify(data));
      return true;
    }

    /* ================= ADD TO CART ================= */

    function addToCart(id) {
      const product = getProduct(id);
      if (!product) return;

      const stockLeft = getStock(id);

      if (stockLeft <= 0) {
        alert("Out of stock.");
        return;
      }

      const cart = getCart();
      const item = cart.find(i => i.id === id);

      const newQty = item ? item.quantity + 1 : 1;

      if (newQty > stockLeft) {
        alert("Not enough stock left.");
        return;
      }

      if (item) {
        item.quantity = newQty;
      } else {
        cart.push({ id, quantity: 1 });
      }

      saveCart(cart);
      renderProduct();
    }

    /* ================= RENDER ================= */

    function renderProduct() {
      if (!product) {
        container.innerHTML = `
          <div class="card" style="text-align:center; padding:25px;">
            <h2>Item not found</h2>
            <p style="opacity:0.7;">This product does not exist or link is incorrect.</p>
            <a class="button-primary" href="shop.html">Back to shop</a>
          </div>
        `;
        return;
      }

      const stockLeft = getStock(product.id);

      container.innerHTML = `
        <div class="product-layout">

          <div class="product-media">
            <img class="product-image-large" src="${product.image}" alt="${product.name}">
          </div>

          <div class="product-info">
            <h1>${product.name}</h1>
            <p class="price">$${product.price}</p>

            <p style="opacity:0.8;">
              Stock: ${stockLeft}
            </p>

            <button class="button-primary" onclick="addToCart('${product.id}')">
              Add to cart
            </button>

            <div class="meta" style="opacity:0.7;">
              <p>✔ Secure checkout (demo)</p>
              <p>✔ Limited availability</p>
            </div>
          </div>

        </div>
      `;
    }

    updateCartCount();
    renderProduct();

    window.addEventListener("storage", () => {
      updateCartCount();
      renderProduct();
    });
  </script>

</body>
</html>
