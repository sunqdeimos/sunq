<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product - SUNQS MARKET</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#ffcc33;
  --gold2:#ffae00;
  --gold3:#ffd86a;
  --dark:#050505;
  --panel:rgba(5,5,5,0.72);
  --border:rgba(255,204,51,0.20);
}

body{
  margin:0;
  font-family:Inter, Arial;
  color:#fff;

  background:
    linear-gradient(to bottom, rgba(0,0,0,0.75), rgba(0,0,0,0.93)),
    url("images/gold-bg.jpg");

  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  opacity:0;
  transition:0.6s ease;
  overflow-x:hidden;
}

body.loaded{opacity:1;}

header{
  padding:18px 22px;
  border-bottom:1px solid rgba(255,204,51,0.15);
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(14px);
  z-index:100;
}

.navlink{
  color:var(--gold3);
  text-decoration:none;
  margin-right:14px;
  font-weight:600;
  transition:0.2s ease;
}

.navlink:hover{
  color:var(--gold2);
  text-shadow:0 0 18px rgba(255,204,51,0.5);
}

.wrap
