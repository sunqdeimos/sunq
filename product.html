<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <a class="logo" href="index.html">SUNQ</a>
    <div class="nav-links">
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
    </div>
  </div>
</nav>

<div class="product-page" id="page"></div>

<script>
const items={
  a:{name:"SUNQS A",price:10,desc:"Item A"},
  b:{name:"SUNQS B",price:15,desc:"Item B"},
  c:{name:"SUNQS C",price:20,desc:"Item C"},
  d:{name:"SUNQS D",price:25,desc:"Item D"},
  e:{name:"SUNQS E",price:30,desc:"Item E"},
  f:{name:"JETS A",price:12,desc:"Item F"},
  g:{name:"JETS B",price:18,desc:"Item G"},
  h:{name:"JETS C",price:22,desc:"Item H"},
  i:{name:"JETS D",price:28,desc:"Item I"},
  j:{name:"JETS E",price:35,desc:"Item J"},
};

let id=new URLSearchParams(location.search).get("id");

let p=items[id];

document.getElementById("page").innerHTML = p ? `
<div class="product-container">
  <div>
    <h1>${p.name}</h1>
    <p>$${p.price}</p>
    <p>${p.desc}</p>
    <button onclick="add()">Add to Cart</button>
  </div>
</div>
` : "Not found";

function add(){
  let cart=JSON.parse(localStorage.getItem("sunqCart"))||[];
  let i=cart.find(x=>x.id===id);
  if(i)i.quantity++;
  else cart.push({id,quantity:1});
  localStorage.setItem("sunqCart",JSON.stringify(cart));
}
</script>

</body>
</html>
