<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product - SUNQS MARKET</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Inter, Arial;
  background:radial-gradient(circle at top,#111 0%, #070707 50%, #050505 100%);
  color:#fff;
  opacity:0;
  transition:0.6s ease;
  overflow-x:hidden;
}

body.loaded{opacity:1;}

header{
  padding:18px 22px;
  border-bottom:1px solid rgba(255,204,51,0.15);
  position:sticky;
  top:0;
  background:rgba(5,5,5,0.85);
  backdrop-filter:blur(10px);
  z-index:100;
}

.navlink{
  color:#ffcc33;
  text-decoration:none;
  margin-right:14px;
  font-weight:500;
  transition:0.2s ease;
}

.navlink:hover{
  opacity:0.7;
  transform:translateY(-2px);
}

.wrap{
  max-width:950px;
  margin:0 auto;
  padding:60px 20px 80px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:25px;
}

@media(max-width:850px){
  .wrap{grid-template-columns:1fr;}
}

.imgbox{
  border-radius:20px;
  overflow:hidden;
  border:1px solid rgba(255,204,51,0.18);
  background:#0f0f0f;
  min-height:350px;
}

.imgbox img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.details{
  background:linear-gradient(145deg,#111,#090909);
  border:1px solid rgba(255,204,51,0.18);
  border-radius:20px;
  padding:25px;
}

.details h1{
  margin:0;
  color:#ffcc33;
  font-size:30px;
  letter-spacing:2px;
}

.price{
  margin-top:12px;
  font-size:26px;
  font-weight:800;
  color:#ffcc33;
}

.desc{
  margin-top:18px;
  color:#aaa;
  line-height:1.6;
  font-size:14px;
}

.btn{
  margin-top:25px;
  width:100%;
  padding:14px;
  border-radius:14px;
  border:none;
  cursor:pointer;
  font-weight:800;
  background:linear-gradient(135deg,#ffcc33,#ffae00);
  color:#000;
  transition:0.25s ease;
}

.btn:hover{
  transform:translateY(-3px);
  box-shadow:0 15px 40px rgba(255,204,51,0.18);
}

.footer{
  padding:40px 20px;
  border-top:1px solid rgba(255,204,51,0.12);
  text-align:center;
  color:#777;
  font-size:13px;
}
</style>
</head>

<body>

<header>
  <a class="navlink" href="index.html">Home</a>
  <a class="navlink" href="shop.html">Shop</a>
  <a class="navlink" href="about.html">About</a>
</header>

<div class="wrap">
  <div class="imgbox">
    <img id="img" src="images/sunqs-a.jpg">
  </div>

  <div class="details">
    <h1 id="name">Product</h1>
    <div class="price" id="price">$0</div>
    <div class="desc" id="desc">Loading...</div>

    <button class="btn" onclick="fakeCheckout()">Proceed to Checkout</button>
  </div>
</div>

<div class="footer">
  © SUNQS MARKET • W.I.P online marketplace
</div>

<script>
window.onload=()=>document.body.classList.add("loaded");

function fakeCheckout(){
  alert("Checkout system is W.I.P");
}

const items={
  1:{name:"SUNQS A",price:"$10",desc:"Entry-level listing for quick purchase.",img:"images/sunqs-a.jpg"},
  2:{name:"SUNQS B",price:"$15",desc:"Mid-tier listing with added value.",img:"images/sunqs-b.jpg"},
  3:{name:"SUNQS C",price:"$20",desc:"Standard premium product listing.",img:"images/sunqs-c.jpg"},
  4:{name:"SUNQS D",price:"$25",desc:"Higher-tier digital bundle listing.",img:"images/sunqs-d.jpg"},
  5:{name:"SUNQS E",price:"$30",desc:"Exclusive premium listing category.",img:"images/sunqs-e.jpg"},
  6:{name:"SUNQS F",price:"$35",desc:"High-demand product listing.",img:"images/sunqs-f.jpg"},
  7:{name:"SUNQS G",price:"$40",desc:"Advanced listing with extra perks.",img:"images/sunqs-g.jpg"},
  8:{name:"SUNQS H",price:"$45",desc:"Top-tier premium listing slot.",img:"images/sunqs-h.jpg"},

  101:{name:"JETS A",price:"$12",desc:"Starter listing from the JETS lineup.",img:"images/jets-a.jpg"},
  102:{name:"JETS B",price:"$18",desc:"Upgraded listing with more features.",img:"images/jets-b.jpg"},
  103:{name:"JETS C",price:"$22",desc:"Balanced mid-tier JETS product.",img:"images/jets-c.jpg"},
  104:{name:"JETS D",price:"$28",desc:"Higher tier listing with more demand.",img:"images/jets-d.jpg"},
  105:{name:"JETS E",price:"$33",desc:"Premium high-tier JETS listing.",img:"images/jets-e.jpg"},
  106:{name:"JETS F",price:"$40",desc:"Top quality premium digital listing.",img:"images/jets-f.jpg"},
  107:{name:"JETS G",price:"$48",desc:"Rare listing slot with extra value.",img:"images/jets-g.jpg"},
  108:{name:"JETS H",price:"$55",desc:"Ultra tier listing reserved for top buyers.",img:"images/jets-h.jpg"}
};

let id=new URLSearchParams(window.location.search).get("item");

if(items[id]){
  document.getElementById("name").innerText=items[id].name;
  document.getElementById("price").innerText=items[id].price;
  document.getElementById("desc").innerText=items[id].desc;
  document.getElementById("img").src=items[id].img;
}
</script>

</body>
</html>
