  <!-- DEBUG ERROR CATCHER (THIS IS WHAT SHOWS WHAT'S BROKEN) -->
  <script>
    window.onerror = function(msg, src, line, col, err) {
      document.body.innerHTML =
        "<pre style='color:white;padding:20px;font-size:14px;'>" +
        "ERROR: " + msg + "\n" +
        "Line: " + line + "\n" +
        "Column: " + col +
        "</pre>";
    };
