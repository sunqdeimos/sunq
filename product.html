<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Product | SUNQ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="styles.css">

  <!-- Load data first, then shared UI -->
  <script src="data.js"></script>
  <script src="store-ui.js"></script>
</head>

<body>

  <!-- ================= NAVBAR ================= -->

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">SUNQ</a>

      <div class="nav-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>

        <a href="cart.html">
          Cart (<span id="cart-count">0</span>)
        </a>
      </div>
    </div>
  </nav>


  <!-- ================= PRODUCT ================= -->

  <main class="shop">
    <div id="product-container"></div>
  </main>


  <!-- ================= TOAST ================= -->

  <div
    id="toast"
    class="toast"
    role="status"
    aria-live="polite"
    aria-atomic="true"
  ></div>


  <!-- ================= FOOTER ================= -->

  <footer class="site-footer">
    <div class="footer-inner">

      <div class="footer-brand">
        <a href="index.html" class="footer-logo">
          SUNQ
        </a>

        <p>
          W.I.P online marketplace.
        </p>
      </div>

      <nav
        class="footer-links"
        aria-label="Footer navigation"
      >
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="cart.html">Cart</a>
      </nav>

      <p class="footer-copy">
        © 2026 SUNQ
      </p>

    </div>
  </footer>


  <!-- ================= PRODUCT LOGIC ================= -->

  <script>
    const params = new URLSearchParams(
      window.location.search
    );

    const productId = params.get("id");
    const product = getProduct(productId);

    const container =
      document.getElementById("product-container");

    let toastTimer;


    /* =====================================================
       TOAST
       ===================================================== */

    function showToast(message, type = "success") {
      const toast = document.getElementById("toast");

      if (!toast) {
        return;
      }

      clearTimeout(toastTimer);

      toast.textContent = message;

      toast.className =
        `toast toast-${type} toast-visible`;

      toastTimer = setTimeout(() => {
        toast.classList.remove("toast-visible");
      }, 2200);
    }


    /* =====================================================
       BUTTON FEEDBACK
       ===================================================== */

    function showButtonFeedback(button) {
      if (!button) {
        return;
      }

      const originalText = button.textContent;

      button.textContent = "Added";
      button.classList.add("button-added");
      button.disabled = true;

      setTimeout(() => {
        button.textContent = originalText;
        button.classList.remove("button-added");
        button.disabled = false;
      }, 850);
    }


    /* =====================================================
       ADD TO CART
       ===================================================== */

    function addToCart(id, button) {
      const selectedProduct = getProduct(id);

      if (!selectedProduct) {
        showToast(
          "Product could not be found.",
          "error"
        );

        return;
      }

      const stock = getStock(id);

      if (stock <= 0) {
        showToast(
          "This item is out of stock.",
          "error"
        );

        return;
      }

      const cart = getCart();

      const item = cart.find(
        cartItem => cartItem.id === id
      );

      const currentQuantity =
        item ? Number(item.quantity) : 0;

      const nextQuantity =
        currentQuantity + 1;

      if (nextQuantity > stock) {
        showToast(
          `Only ${stock} available.`,
          "error"
        );

        return;
      }

      if (item) {
        item.quantity = nextQuantity;
      } else {
        cart.push({
          id,
          quantity: 1
        });
      }

      saveCart(cart);

      showButtonFeedback(button);

      showToast(
        `${selectedProduct.name} added to your cart.`
      );

      renderProduct();
    }


    /* =====================================================
       MAIN PRODUCT MARKUP
       ===================================================== */

    function renderProduct() {
      if (!product) {
        container.innerHTML = `
          <section class="empty-state product-not-found">
            <h1>Item not found</h1>

            <p>
              This product does not exist or the link is incorrect.
            </p>

            <a
              class="button-secondary"
              href="shop.html"
            >
              Back to shop
            </a>
          </section>
        `;

        return;
      }

      const stock = getStock(product.id);

      const categoryLabel =
        getCategoryLabel(product.category);

      const badge = getProductBadge(product);

      const badgeClass =
        getBadgeClass(badge);

      const stockClass =
        getStockClass(stock);

      const stockLabel =
        getStockLabel(stock);

      const badgeMarkup = badge
        ? `
          <span class="product-detail-badge ${escapeHTML(badgeClass)}">
            ${escapeHTML(badge)}
          </span>
        `
        : "";

      const buttonMarkup =
        stock > 0
          ? `
            <button
              class="button-primary product-add-button"
              type="button"
              onclick="addToCart('${escapeHTML(product.id)}', this)"
            >
              Add to cart
            </button>
          `
          : `
            <button
              class="button-primary product-add-button"
              type="button"
              disabled
            >
              Out of stock
            </button>
          `;

      container.innerHTML = `
        <article class="product-layout">

          <div class="product-media">
            <div class="product-image-frame">

              <img
                class="product-image-large"
                src="${escapeHTML(getProductImage(product))}"
                alt="${escapeHTML(product.name)}"
                onerror="
                  this.onerror = null;
                  this.src = 'https://placehold.co/800x800/111111/d4af37?text=SUNQ';
                "
              >

              ${badgeMarkup}

            </div>
          </div>


          <div class="product-info">

            <p class="product-category">
              ${escapeHTML(categoryLabel)}
            </p>

            <h1>
              ${escapeHTML(product.name)}
            </h1>

            <p class="price">
              ${formatPrice(product.price)}
            </p>

            <p class="product-stock ${escapeHTML(stockClass)}">
              ${escapeHTML(stockLabel)}
            </p>

            <section class="product-description">
              <h2>Description</h2>

              <p>
                ${escapeHTML(product.description)}
              </p>
            </section>

            ${buttonMarkup}

            <div class="meta">
              <p>Secure checkout demo</p>
              <p>Limited availability</p>
            </div>

          </div>

        </article>


        <section class="related-section">
          <div class="section-heading-row">
            <h2 class="collection-title">
              You may also like
            </h2>

            <a
              class="text-link"
              href="shop.html"
            >
              View all
            </a>
          </div>

          <div id="related-products"></div>
        </section>
      `;

      renderRelatedProducts(
        "related-products",
        product.id,
        4
      );
    }


    /* =====================================================
       UPDATES
       ===================================================== */

    window.addEventListener(
      "sunq:stockchange",
      renderProduct
    );

    window.addEventListener(
      "sunq:externalchange",
      renderProduct
    );

    window.addEventListener(
      "sunq:cartchange",
      updateCartCount
    );


    /* =====================================================
       INITIALIZE
       ===================================================== */

    updateCartCount();
    renderProduct();
  </script>

</body>
</html>
