<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | SUNQ</title>

  <!-- FONTS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <!-- PRODUCTS -->
  <script src="data.js"></script>
</head>

<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">SUNQ</a>

      <div class="nav-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
      </div>
    </div>
  </nav>

  <main class="shop">
    <div id="product-container"></div>
  </main>

  <script>
    function getCart() {
      return JSON.parse(localStorage.getItem("sunqCart")) || [];
    }

    function updateCartCount() {
      const cart = getCart();
      const total = cart.reduce((sum, i) => sum + i.quantity, 0);
      const el = document.getElementById("cart-count");
      if (el) el.textContent = total;
    }

    function saveCart(cart) {
      localStorage.setItem("sunqCart", JSON.stringify(cart));
      updateCartCount();
    }

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    const product = getProduct(id);
    const container = document.getElementById("product-container");

    function addToCart(id) {
      const product = PRODUCTS[id];
      if (!product) return;

      const stockLeft = getStock(id);

      if (stockLeft <= 0) {
        alert("Out of stock.");
        return;
      }

      const cart = getCart();
      const item = cart.find(i => i.id === id);

      if (item) {
        if (item.quantity + 1 > stockLeft) {
          alert("Not enough stock left.");
          return;
        }
        item.quantity += 1;
      } else {
        cart.push({ id, quantity: 1 });
      }

      saveCart(cart);

      // refresh the page UI so stock updates live
      renderProduct();
    }

    function renderProduct() {
      if (!product) {
        container.innerHTML = `
          <div class="card" style="text-align:center; padding:25px;">
            <h2>Item not found</h2>
            <p style="opacity:0.7;">This product does not exist or the link is incorrect.</p>
            <a class="button-primary" href="shop.html">Back to shop</a>
          </div>
        `;
        return;
      }

      const stockLeft = getStock(product.id);

      const stockHTML = stockLeft > 0
        ? `<p style="opacity:0.85;"><strong>Stock:</strong> ${stockLeft} left</p>`
        : `<p style="color:#ff4d4d; font-weight:600;">Out of stock</p>`;

      const buttonHTML = stockLeft > 0
        ? `<button class="button-primary" onclick="addToCart('${product.id}')">Add to cart</button>`
        : `<button class="button-primary" style="opacity:0.5; cursor:not-allowed;" disabled>Out of stock</button>`;

      container.innerHTML = `
        <div class="product-layout">

          <div class="product-media">
            <img class="product-image-large" src="${product.image}" alt="${product.name}">
          </div>

          <div class="product-info">
            <h1>${product.name}</h1>
            <p class="price">$${product.price}</p>

            ${stockHTML}

            <p style="opacity:0.75;">
              A curated product from SUNQ. Clean, minimal, and intentionally designed.
            </p>

            ${buttonHTML}

            <div class="meta" style="opacity:0.75;">
              <p>✔ Secure checkout (demo)</p>
              <p>✔ Limited availability</p>
            </div>
          </div>

        </div>

        <section class="collection" style="margin-top:40px;">
          <h2 class="collection-title">You may also like</h2>

          <div class="grid">
            ${Object.values(PRODUCTS)
              .filter(p => p.id !== product.id)
              .map(p => `
                <a class="card fade" href="product.html?id=${p.id}">
                  <div class="card-image"></div>
                  <h3>${p.name}</h3>
                  <p>$${p.price}</p>
                </a>
              `).join("")}
          </div>
        </section>
      `;
    }

    updateCartCount();
    renderProduct();

    // If user comes back after checkout in another tab, update stock display
    window.addEventListener("storage", () => {
      updateCartCount();
      renderProduct();
    });
  </script>

</body>
</html>
