<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<nav class="navbar">
  <a class="logo" href="index.html">SUNQ</a>
  <div class="nav-links">
    <a href="shop.html">Shop</a>
    <a href="about.html">About</a>
    <a href="cart.html">Cart</a>
  </div>
</nav>

<div id="wrap" style="padding:60px;text-align:center;"></div>

<script>
const products=[
  {id:"a1",name:"SUNQS A",price:10,img:"images/sunqs-a.jpg"},
  {id:"a2",name:"SUNQS B",price:15,img:"images/sunqs-b.jpg"},
  {id:"a3",name:"SUNQS C",price:20,img:"images/sunqs-c.jpg"},
  {id:"a4",name:"SUNQS D",price:25,img:"images/sunqs-d.jpg"},
  {id:"a5",name:"SUNQS E",price:30,img:"images/sunqs-e.jpg"},
  {id:"j1",name:"JETS A",price:12,img:"images/jets-a.jpg"},
  {id:"j2",name:"JETS B",price:18,img:"images/jets-b.jpg"},
  {id:"j3",name:"JETS C",price:22,img:"images/jets-c.jpg"},
  {id:"j4",name:"JETS D",price:28,img:"images/jets-d.jpg"},
  {id:"j5",name:"JETS E",price:33,img:"images/jets-e.jpg"}
];

const id=new URLSearchParams(location.search).get("id");
const p=products.find(x=>x.id===id);

document.getElementById("wrap").innerHTML=p?`
  <img src="${p.img}" style="width:400px;border-radius:20px">
  <h1>${p.name}</h1>
  <p>$${p.price}</p>
`: "Not found";
</script>

</body>
</html>
