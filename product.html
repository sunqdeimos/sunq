<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#070707;
  color:#fff;
  opacity:0;
  transition:0.6s ease;
}

body.loaded{opacity:1;}

header{
  padding:20px;
  border-bottom:1px solid #333;
}

a{
  color:#ffcc33;
  text-decoration:none;
  margin-right:10px;
}

.box{
  max-width:520px;
  margin:60px auto;
  padding:20px;
  background:#111;
  border:1px solid #ffcc33;
  border-radius:14px;
}

button{
  width:100%;
  padding:12px;
  background:#000;
  border:1px solid #ffcc33;
  color:#ffcc33;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <a href="index.html" onclick="nav(event,'index.html')">Home</a>
  <a href="shop.html" onclick="nav(event,'shop.html')">Shop</a>
</header>

<div class="box">
  <h1 id="name"></h1>
  <div id="price"></div>
  <p id="desc"></p>
</div>

<script>
window.onload=()=>document.body.classList.add("loaded");

function nav(e,url){
  e.preventDefault();
  document.body.classList.remove("loaded");
  setTimeout(()=>location.href=url,400);
}

const items={
  1:{name:"SUNQS A",price:"$10",desc:"Product"},
  2:{name:"SUNQS B",price:"$15",desc:"Product"},
  3:{name:"SUNQS C",price:"$20",desc:"Product"},
  4:{name:"SUNQS D",price:"$25",desc:"Product"},
  5:{name:"SUNQS E",price:"$30",desc:"Product"},
  6:{name:"SUNQS F",price:"$35",desc:"Product"},

  101:{name:"JETS A",price:"$12",desc:"Product"},
  102:{name:"JETS B",price:"$18",desc:"Product"},
  103:{name:"JETS C",price:"$22",desc:"Product"},
  104:{name:"JETS D",price:"$28",desc:"Product"},
  105:{name:"JETS E",price:"$33",desc:"Product"},
  106:{name:"JETS F",price:"$40",desc:"Product"}
};

let id=new URLSearchParams(window.location.search).get("item");

if(items[id]){
  document.getElementById("name").innerText=items[id].name;
  document.getElementById("price").innerText=items[id].price;
  document.getElementById("desc").innerText=items[id].desc;
}
</script>

</body>
</html>
