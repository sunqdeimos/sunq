<!DOCTYPE html>
<html>
<head>
  <title>Product</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="product"></div>

<script src="data.js"></script>

<script>
const id = new URLSearchParams(location.search).get("item");
const p = PRODUCTS[id];

document.getElementById("product").innerHTML =
p ? `
  <h1>${p.name}</h1>
  <img src="${p.image}" style="width:300px">
  <p>$${p.price}</p>
` : "Item not found";
</script>

</body>
</html>
