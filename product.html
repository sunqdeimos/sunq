<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product - SUNQS MARKET</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- GLOBAL STYLE SYSTEM -->
<link rel="stylesheet" href="styles.css">

<style>
/* product-specific layout only (NO full redesign CSS here anymore) */

.product-wrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
  align-items:start;
}

.product-img{
  border-radius:26px;
  overflow:hidden;
  border:1px solid var(--border);
  background:rgba(0,0,0,0.4);
}

.product-img img{
  width:100%;
  height:520px;
  object-fit:cover;
  display:block;
}

.product-info h1{
  font-size:var(--text-xl);
  margin-bottom:10px;
}

.price{
  font-size:26px;
  font-weight:900;
  color:var(--gold3);
  margin-top:10px;
}

.desc{
  margin-top:20px;
  font-size:18px;
  color:#ddd;
  line-height:1.7;
}

@media (max-width:900px){
  .product-wrap{
    grid-template-columns:1fr;
  }

  .product-img img{
    height:380px;
  }
}
</style>
</head>

<body>

<header>
  <a class="navlink" href="index.html">Home</a>
  <a class="navlink" href="shop.html">Shop</a>
  <a class="navlink" href="about.html">About</a>
</header>

<div class="page">

  <div class="product-wrap">

    <div class="product-img">
      <img id="img" src="images/sunqs-a.jpg">
    </div>

    <div class="product-info">
      <h1 id="name">Product</h1>
      <div class="price" id="price">$0</div>

      <div class="desc" id="desc">
        Loading product information...
      </div>

      <button onclick="fakeCheckout()">Proceed to Checkout</button>
    </div>

  </div>

</div>

<script>
const items = {
  1:{name:"SUNQS A",price:"$10",desc:"Entry-level listing for quick purchase.",img:"images/sunqs-a.jpg"},
  2:{name:"SUNQS B",price:"$15",desc:"Mid-tier listing with added value.",img:"images/sunqs-b.jpg"},
  3:{name:"SUNQS C",price:"$20",desc:"Standard product listing.",img:"images/sunqs-c.jpg"},
  4:{name:"SUNQS D",price:"$25",desc:"Higher-tier digital listing.",img:"images/sunqs-d.jpg"},
  5:{name:"SUNQS E",price:"$30",desc:"Premium listing category.",img:"images/sunqs-e.jpg"},

  101:{name:"JETS A",price:"$12",desc:"Starter listing from JETS collection.",img:"images/jets-a.jpg"},
  102:{name:"JETS B",price:"$18",desc:"Upgraded JETS listing.",img:"images/jets-b.jpg"},
  103:{name:"JETS C",price:"$22",desc:"Balanced mid-tier product.",img:"images/jets-c.jpg"},
  104:{name:"JETS D",price:"$28",desc:"High demand listing.",img:"images/jets-d.jpg"},
  105:{name:"JETS E",price:"$33",desc:"Premium JETS listing.",img:"images/jets-e.jpg"}
};

const id = new URLSearchParams(window.location.search).get("item");

if(items[id]){
  document.getElementById("name").innerText = items[id].name;
  document.getElementById("price").innerText = items[id].price;
  document.getElementById("desc").innerText = items[id].desc;
  document.getElementById("img").src = items[id].img;
}

function fakeCheckout(){
  alert("Checkout system is still W.I.P");
}
</script>

</body>
</html>
