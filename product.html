<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
  <a href="index.html" class="logo navlink">SUNQ</a>

  <div>
    <a href="shop.html" class="navlink">Shop</a>
    <a href="about.html" class="navlink">About</a>
    <a href="cart.html" class="navlink">Cart (<span id="cart-count">0</span>)</a>
  </div>
</header>

<div class="product-grid" id="wrap"></div>

<script>
window.onload=()=>document.body.classList.add("loaded");

const items={
  "item-a":{name:"SUNQS A",price:10,desc:["Entry item","Clean listing","Starter product"]},
  "item-b":{name:"SUNQS B",price:15,desc:["Mid tier","Better exposure","Balanced value"]},
  "item-c":{name:"SUNQS C",price:20,desc:["Premium listing","Strong demand","Reliable"]},
  "item-d":{name:"JETS A",price:25,desc:["Jets entry","Secondary line","Growing demand"]},
  "item-e":{name:"JETS B",price:30,desc:["Higher tier","Limited supply","Premium feel"]},
  "item-f":{name:"JETS C",price:40,desc:["Top Jets item","Rare","High value"]}
};

function getCart(){
  return JSON.parse(localStorage.getItem("sunqCart"))||[];
}

function saveCart(c){
  localStorage.setItem("sunqCart",JSON.stringify(c));
}

function add(id){
  let c=getCart();
  let f=c.find(i=>i.id===id);
  if(f)f.quantity++;
  else c.push({id,quantity:1});
  saveCart(c);
}

function load(){
  const id=new URLSearchParams(location.search).get("item");
  const p=items[id];

  const w=document.getElementById("wrap");

  if(!p){
    w.innerHTML=`<div class="card"><h2>Not found</h2></div>`;
    return;
  }

  w.innerHTML=`
    <div class="card">
      <h1>${p.name}</h1>
      <h2>$${p.price}</h2>

      <ul>
        ${p.desc.map(d=>`<li>• ${d}</li>`).join("")}
      </ul>

      <button onclick="add('${id}')">Add to Cart</button>
      <a href="shop.html" class="button-primary">Back</a>
    </div>
  `;
}

load();
</script>

</body>
</html>
