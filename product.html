<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="styles.css">
<script defer src="app.js"></script>
</head>

<body>

<header>
  <a class="navlink" href="index.html">Home</a>
  <a class="navlink" href="shop.html">Shop</a>
  <a class="navlink" href="cart.html">Cart (<span id="cart-count">0</span>)</a>
</header>

<div class="page" id="product"></div>

<script>
const id = new URLSearchParams(location.search).get("id");
const p = items[id];

document.getElementById("product").innerHTML = `
  <h1>${p.name}</h1>
  <img src="${p.image}" style="width:400px">
  <p>$${p.price}</p>
  <button onclick="
    let c=getCart();
    let i=c.find(x=>x.id==='${p.id}');
    if(i)i.quantity++;else c.push({id:'${p.id}',quantity:1});
    saveCart(c);updateCartUI();
  ">Add to Cart</button>
`;

updateCartUI();
</script>

</body>
</html>
