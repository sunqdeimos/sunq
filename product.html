<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNQS MARKET | Product</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:
    radial-gradient(circle at top, rgba(255,204,51,0.08), transparent 40%),
    #070707;
  color:#fff;
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(6px);}
  to{opacity:1; transform:translateY(0);}
}

header{
  padding:20px;
  border-bottom:1px solid rgba(255,204,51,0.15);
  background:rgba(10,10,10,0.8);
  backdrop-filter:blur(10px);
}

a{
  color:#ffcc33;
  text-decoration:none;
  margin-right:10px;
}

.box{
  max-width:500px;
  margin:60px auto;
  padding:20px;
  background:#111;
  border:1px solid #ffcc33;
  border-radius:12px;
}

h1{color:#ffcc33;}

.price{color:#ffcc33;font-size:20px;}

button{
  width:100%;
  padding:12px;
  background:#000;
  border:1px solid #ffcc33;
  color:#ffcc33;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 20px rgba(255,204,51,0.12);
}
</style>
</head>

<body>

<header>
  <a href="index.html">Home</a>
  <a href="shop.html">Shop</a>
</header>

<div class="box">
  <h1 id="name"></h1>
  <div class="price" id="price"></div>
  <p id="desc"></p>

  <button onclick="addToCart(name,price)">Add to Cart</button>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name,price){
  cart.push({name,price});
  localStorage.setItem("cart",JSON.stringify(cart));
  alert("Added to cart");
}

const items={
  "1":{name:"Item One",price:"$10",desc:"Placeholder product."},
  "2":{name:"Item Two",price:"$15",desc:"Placeholder product."},
  "3":{name:"Item Three",price:"$20",desc:"Placeholder product."}
};

let id=new URLSearchParams(window.location.search).get("item");

if(items[id]){
  document.getElementById("name").innerText=items[id].name;
  document.getElementById("price").innerText=items[id].price;
  document.getElementById("desc").innerText=items[id].desc;
}
</script>

</body>
</html>
