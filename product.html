<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<nav class="navbar">
  <div class="nav-container">
    <a class="logo" href="index.html">SUNQ</a>
    <div class="nav-links">
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="cart.html">Cart</a>
    </div>
  </div>
</nav>

<div class="hero">
  <div class="hero-title" id="name">Loading...</div>
  <p id="price"></p>
</div>

<script>
const items={
  "1":{name:"SUNQS A",price:10},
  "2":{name:"SUNQS B",price:15},
  "3":{name:"SUNQS C",price:20},
  "4":{name:"SUNQS D",price:25},
  "5":{name:"SUNQS E",price:30}
};

let id = new URLSearchParams(location.search).get("item");

if(items[id]){
  document.getElementById("name").innerText = items[id].name;
  document.getElementById("price").innerText = "$"+items[id].price;
}
</script>

</body>
</html>
