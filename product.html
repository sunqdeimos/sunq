<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Product | SUNQ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="styles.css">

  <!-- Supabase first -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Project connection -->
  <script src="supabase-config.js"></script>

  <!-- Product data and shared UI -->
  <script src="data.js"></script>
  <script src="store-ui.js"></script>
</head>

<body>

  <!-- ================= NAVBAR ================= -->

  <nav class="navbar">
    <div class="nav-container">

      <a
        href="index.html"
        class="logo"
      >
        SUNQ
      </a>

      <div class="nav-links">

        <a href="shop.html">
          Shop
        </a>

        <a href="about.html">
          About
        </a>

        <a href="cart.html">
          Cart (<span id="cart-count">0</span>)
        </a>

      </div>

    </div>
  </nav>


  <!-- ================= PRODUCT ================= -->

  <main class="shop">

    <div
      id="product-container"
      aria-live="polite"
      aria-busy="true"
    >

      <section class="empty-state">

        <p class="empty-state-kicker">
          Loading
        </p>

        <h2>
          Getting the product ready.
        </h2>

        <p>
          This should only take a moment.
        </p>

      </section>

    </div>

  </main>


  <!-- ================= TOAST ================= -->

  <div
    id="toast"
    class="toast"
    role="status"
    aria-live="polite"
    aria-atomic="true"
  ></div>


  <!-- ================= FOOTER ================= -->

  <footer class="site-footer">

    <div class="footer-inner">

      <div class="footer-brand">

        <a
          href="index.html"
          class="footer-logo"
        >
          SUNQ
        </a>

        <p>
          Built one listing at a time.
        </p>

      </div>

      <nav
        class="footer-links"
        aria-label="Footer navigation"
      >
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="cart.html">Cart</a>
      </nav>

      <p class="footer-copy">
        © 2026 SUNQ
      </p>

    </div>

  </footer>


  <!-- ================= PRODUCT LOGIC ================= -->

  <script>
    const productContainer =
      document.getElementById("product-container");

    const params =
      new URLSearchParams(window.location.search);

    const productId =
      params.get("id");

    let currentProduct = null;
    let toastTimer;


    /* =====================================================
       TOAST
       ===================================================== */

    function showToast(
      message,
      type = "success"
    ) {
      const toast =
        document.getElementById("toast");

      if (!toast) {
        return;
      }

      clearTimeout(toastTimer);

      toast.textContent = message;

      toast.className =
        `toast toast-${type} toast-visible`;

      toastTimer = setTimeout(() => {
        toast.classList.remove(
          "toast-visible"
        );
      }, 2200);
    }


    /* =====================================================
       BUTTON FEEDBACK
       ===================================================== */

    function showButtonFeedback(button) {
      if (!button) {
        return;
      }

      const originalText =
        button.textContent;

      button.textContent =
        "Added";

      button.classList.add(
        "button-added"
      );

      button.disabled = true;

      setTimeout(() => {
        button.textContent =
          originalText;

        button.classList.remove(
          "button-added"
        );

        button.disabled = false;
      }, 850);
    }


    /* =====================================================
       ADD TO CART
       ===================================================== */

    function addToCart(
      id,
      button
    ) {
      const selectedProduct =
        getProduct(id);

      if (!selectedProduct) {
        showToast(
          "Product could not be found.",
          "error"
        );

        return;
      }

      const availableStock =
        getStock(id);

      if (availableStock <= 0) {
        showToast(
          "This item is unavailable.",
          "error"
        );

        return;
      }

      const cart =
        getCart();

      const cartItem =
        cart.find(item => {
          return item.id === id;
        });

      const currentQuantity =
        cartItem
          ? Number(cartItem.quantity)
          : 0;

      const nextQuantity =
        currentQuantity + 1;

      if (nextQuantity > availableStock) {
        showToast(
          `Only ${availableStock} available.`,
          "error"
        );

        return;
      }

      if (cartItem) {
        cartItem.quantity =
          nextQuantity;
      } else {
        cart.push({
          id,
          quantity: 1
        });
      }

      saveCart(cart);

      showButtonFeedback(button);

      showToast(
        `${selectedProduct.name} added to your cart.`
      );

      updateCartCount();
    }


    /* =====================================================
       PRODUCT SPECIFICATION
       ===================================================== */

    function renderProductSpecification(
      label,
      value,
      extraClass = ""
    ) {
      return `
        <div class="product-spec ${escapeHTML(extraClass)}">

          <span class="product-spec-label">
            ${escapeHTML(label)}
          </span>

          <strong class="product-spec-value">
            ${escapeHTML(value)}
          </strong>

        </div>
      `;
    }


    /* =====================================================
       LOADING ERROR
       ===================================================== */

    function renderLoadError() {
      productContainer.innerHTML = `
        <section class="empty-state">

          <p class="empty-state-kicker">
            Something went wrong
          </p>

          <h1>
            The product did not load.
          </h1>

          <p>
            Check the database connection and try refreshing the page.
          </p>

          <button
            class="button-secondary"
            type="button"
            onclick="window.location.reload()"
          >
            Try again
          </button>

        </section>
      `;

      productContainer.setAttribute(
        "aria-busy",
        "false"
      );
    }


    /* =====================================================
       PRODUCT NOT FOUND
       ===================================================== */

    function renderMissingProduct() {
      productContainer.innerHTML = `
        <section class="empty-state product-not-found">

          <p class="empty-state-kicker">
            Product page
          </p>

          <h1>
            Item not found
          </h1>

          <p>
            This product does not exist or the link is incorrect.
          </p>

          <a
            class="button-secondary"
            href="shop.html"
          >
            Back to shop
          </a>

        </section>
      `;

      productContainer.setAttribute(
        "aria-busy",
        "false"
      );
    }


    /* =====================================================
       PRODUCT RENDER
       ===================================================== */

    function renderProduct() {
      if (!currentProduct) {
        renderMissingProduct();
        return;
      }

      const stock =
        getStock(currentProduct.id);

      const categoryLabel =
        getCategoryLabel(
          currentProduct.category
        );

      const platform =
        getProductPlatform(
          currentProduct
        );

      const delivery =
        getProductDelivery(
          currentProduct
        );

      const availability =
        getAvailabilityLabel(
          currentProduct.id
        );

      const availabilityClass =
        getAvailabilityClass(
          currentProduct.id
        );

      const badge =
        getProductBadge(
          currentProduct
        );

      const badgeClass =
        getBadgeClass(badge);

      const badgeMarkup = badge
        ? `
          <span
            class="product-detail-badge ${escapeHTML(badgeClass)}"
          >
            ${escapeHTML(badge)}
          </span>
        `
        : "";

      const addButtonMarkup =
        stock > 0
          ? `
            <button
              class="button-primary product-add-button"
              type="button"
              onclick="addToCart('${escapeHTML(currentProduct.id)}', this)"
            >
              Add to cart
            </button>
          `
          : `
            <button
              class="button-primary product-add-button"
              type="button"
              disabled
            >
              Unavailable
            </button>
          `;

      productContainer.innerHTML = `
        <article class="product-layout">

          <!-- IMAGE -->

          <div class="product-media">

            <div class="product-image-frame">

              <img
                class="product-image-large"
                src="${escapeHTML(getProductImage(currentProduct))}"
                alt="${escapeHTML(currentProduct.name)}"
                onerror="
                  this.onerror = null;
                  this.src = 'https://placehold.co/800x800/111111/d4af37?text=SUNQ';
                "
              >

              ${badgeMarkup}

            </div>

          </div>


          <!-- INFORMATION -->

          <div class="product-info">

            <p class="product-category">
              ${escapeHTML(categoryLabel)}
            </p>

            <h1>
              ${escapeHTML(currentProduct.name)}
            </h1>

            <p class="price">
              ${formatPrice(currentProduct.price)}
            </p>


            <!-- SPECIFICATIONS -->

            <div class="product-spec-grid">

              ${renderProductSpecification(
                "Platform",
                platform
              )}

              ${renderProductSpecification(
                "Delivery",
                delivery
              )}

              ${renderProductSpecification(
                "Category",
                categoryLabel
              )}

              ${renderProductSpecification(
                "Availability",
                availability,
                availabilityClass
              )}

            </div>


            <!-- DESCRIPTION -->

            <section class="product-description">

              <h2>
                Description
              </h2>

              <p>
                ${escapeHTML(currentProduct.description)}
              </p>

            </section>


            <!-- ADD TO CART -->

            ${addButtonMarkup}


            <!-- SMALL DETAILS -->

            <div class="meta">

              <p>
                ✔ Secure checkout
              </p>

              <p>
                ✔ No crashes
              </p>

              <p>
                ✔ Most likely.
              </p>

            </div>

          </div>

        </article>


        <!-- RELATED PRODUCTS -->

        <section class="related-section">

          <div class="section-heading-row">

            <div>

              <p class="section-kicker">
                More listings
              </p>

              <h2 class="collection-title">
                You may also like
              </h2>

            </div>

            <a
              class="text-link"
              href="shop.html"
            >
              View all
            </a>

          </div>

          <div id="related-products"></div>

        </section>
      `;

      renderRelatedProducts(
        "related-products",
        currentProduct.id,
        4
      );

      productContainer.setAttribute(
        "aria-busy",
        "false"
      );
    }


    /* =====================================================
       INITIALIZE
       ===================================================== */

    async function initializeProductPage() {
      updateCartCount();

      if (!productId) {
        renderMissingProduct();
        return;
      }

      try {
        await productsReady;

        if (
          getProductsLoadError() ||
          !areProductsLoaded()
        ) {
          renderLoadError();
          return;
        }

        currentProduct =
          getProduct(productId);

        renderProduct();
      } catch (error) {
        console.error(
          "Could not initialize the product page:",
          error
        );

        renderLoadError();
      }
    }


    /* =====================================================
       CART UPDATES
       ===================================================== */

    window.addEventListener(
      "sunq:cartchange",
      updateCartCount
    );

    window.addEventListener(
      "sunq:externalchange",
      updateCartCount
    );


    /* =====================================================
       FUTURE PRODUCT REFRESH
       ===================================================== */

    window.addEventListener(
      "sunq:productsloaded",
      () => {
        if (!productId) {
          return;
        }

        currentProduct =
          getProduct(productId);

        renderProduct();
      }
    );


    initializeProductPage();
  </script>

</body>
</html>
