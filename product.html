<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | SUNQ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <!-- PRODUCT DATA -->
  <script src="data.js"></script>
</head>

<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">SUNQ</a>

      <div class="nav-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
      </div>
    </div>
  </nav>

  <main class="shop">
    <div id="product-container"></div>
  </main>

  <!-- TOAST POPUP -->
  <div
    id="toast"
    role="status"
    aria-live="polite"
    aria-atomic="true"
  ></div>

  <script>
    /* ================= CART ================= */

    function getCart() {
      try {
        return JSON.parse(localStorage.getItem("sunqCart")) || [];
      } catch (error) {
        console.error("Could not read cart:", error);
        return [];
      }
    }

    function saveCart(cart) {
      localStorage.setItem("sunqCart", JSON.stringify(cart));
      updateCartCount();
    }

    function updateCartCount() {
      const cart = getCart();
      const total = cart.reduce((sum, item) => {
        return sum + Number(item.quantity || 0);
      }, 0);

      const el = document.getElementById("cart-count");

      if (el) {
        el.textContent = total;
      }
    }

    /* ================= PRODUCT LOOKUP ================= */

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    function findProduct(productId) {
      return PRODUCTS.find(product => product.id === productId);
    }

    const product = findProduct(id);
    const container = document.getElementById("product-container");

    /* ================= STOCK ================= */

    function readStockData() {
      try {
        return JSON.parse(localStorage.getItem("sunqStock")) || {};
      } catch (error) {
        console.error("Could not read stock:", error);
        return {};
      }
    }

    function getCurrentStock(productId) {
      const data = readStockData();
      return Number(data[productId] ?? 0);
    }

    /* ================= TOAST ================= */

    let toastTimer;

    function showToast(message, type = "success") {
      const toast = document.getElementById("toast");

      if (!toast) return;

      clearTimeout(toastTimer);

      toast.textContent = message;
      toast.className = `toast toast-${type} toast-visible`;

      toastTimer = setTimeout(() => {
        toast.classList.remove("toast-visible");
      }, 2200);
    }

    /* ================= BUTTON FEEDBACK ================= */

    function showButtonFeedback(button) {
      if (!button) return;

      const originalText = button.textContent;

      button.textContent = "Added";
      button.classList.add("button-added");
      button.disabled = true;

      setTimeout(() => {
        button.textContent = originalText;
        button.classList.remove("button-added");
        button.disabled = false;
      }, 850);
    }

    /* ================= ADD TO CART ================= */

    function addToCart(productId, button) {
      const selectedProduct = findProduct(productId);

      if (!selectedProduct) {
        showToast("Product could not be found.", "error");
        return;
      }

      const stockLeft = getCurrentStock(productId);

      if (stockLeft <= 0) {
        showToast("This item is out of stock.", "error");
        return;
      }

      const cart = getCart();
      const item = cart.find(cartItem => cartItem.id === productId);

      const newQuantity = item ? item.quantity + 1 : 1;

      if (newQuantity > stockLeft) {
        showToast(`Only ${stockLeft} available.`, "error");
        return;
      }

      if (item) {
        item.quantity = newQuantity;
      } else {
        cart.push({
          id: productId,
          quantity: 1
        });
      }

      saveCart(cart);
      showButtonFeedback(button);
      showToast(`${selectedProduct.name} added to your cart.`);
    }

    /* ================= RENDER ================= */

    function renderProduct() {
      if (!product) {
        container.innerHTML = `
          <div class="card" style="text-align:center; padding:25px;">
            <h2>Item not found</h2>

            <p style="opacity:0.7;">
              This product does not exist or the link is incorrect.
            </p>

            <a class="button-primary" href="shop.html">
              Back to shop
            </a>
          </div>
        `;

        return;
      }

      const stockLeft = getCurrentStock(product.id);

      const stockMarkup = stockLeft > 0
        ? `<p style="opacity:0.8;">Stock: ${stockLeft}</p>`
        : `<p style="color:#ff5656; font-weight:700;">Out of stock</p>`;

      const buttonMarkup = stockLeft > 0
        ? `
          <button
            class="button-primary"
            type="button"
            onclick="addToCart('${product.id}', this)"
          >
            Add to cart
          </button>
        `
        : `
          <button
            class="button-primary"
            type="button"
            disabled
          >
            Out of stock
          </button>
        `;

      container.innerHTML = `
        <div class="product-layout">

          <div class="product-media">
            <img
              class="product-image-large"
              src="${product.image}"
              alt="${product.name}"
            >
          </div>

          <div class="product-info">
            <h1>${product.name}</h1>

            <p class="price">
              $${Number(product.price).toFixed(2)}
            </p>

            ${stockMarkup}

            ${buttonMarkup}

            <div class="meta" style="opacity:0.7;">
              <p>✔ Secure checkout (demo)</p>
              <p>✔ Limited availability</p>
            </div>
          </div>

        </div>
      `;
    }

    /* ================= INIT ================= */

    updateCartCount();
    renderProduct();

    window.addEventListener("storage", event => {
      if (
        event.key === "sunqCart" ||
        event.key === "sunqStock"
      ) {
        updateCartCount();
        renderProduct();
      }
    });
  </script>

  <style>
    /* ================= TOAST POPUP ================= */

    .toast {
      position: fixed;
      left: 50%;
      bottom: 28px;
      z-index: 1000;

      width: calc(100% - 32px);
      max-width: 420px;

      padding: 15px 18px;

      color: #fff;
      text-align: center;

      background: rgba(8, 8, 10, 0.96);

      border: 1px solid rgba(212, 175, 55, 0.85);
      border-radius: 4px;

      box-shadow:
        0 18px 45px rgba(0, 0, 0, 0.58),
        0 0 18px rgba(212, 175, 55, 0.12);

      opacity: 0;
      pointer-events: none;

      transform:
        translate(-50%, 18px)
        scale(0.98);

      transition:
        opacity 0.22s ease,
        transform 0.22s ease;

      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .toast-visible {
      opacity: 1;

      transform:
        translate(-50%, 0)
        scale(1);
    }

    .toast-error {
      color: #fff;

      border-color: rgba(255, 86, 86, 0.9);

      box-shadow:
        0 18px 45px rgba(0, 0, 0, 0.58),
        0 0 18px rgba(255, 86, 86, 0.12);
    }

    /* ================= BUTTON SUCCESS STATE ================= */

    .button-added {
      color: #111 !important;

      background: linear-gradient(
        90deg,
        #e2c45a,
        #fff0a0
      ) !important;

      transform: scale(0.98);

      box-shadow:
        0 0 0 2px rgba(212, 175, 55, 0.18),
        0 8px 22px rgba(0, 0, 0, 0.28);
    }

    @media (max-width: 600px) {
      .toast {
        bottom: 18px;
      }
    }
  </style>

</body>
</html>
