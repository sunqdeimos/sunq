<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SUNQS MARKET</title>

<style>
  :root{
    --bg:#070707;
    --panel:#171717;
    --gold:#ffcc33;
    --gold-glow:#ffd966;
    --text:#f5f5f5;
    --muted:#b5b5b5;
  }

  body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  header{
    background:linear-gradient(180deg,#121212,#070707);
    border-bottom:1px solid rgba(255,204,51,0.3);
  }

  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
  }

  .logo{
    color:var(--gold);
    font-weight:bold;
    letter-spacing:2px;
    font-size:18px;
  }

  .menu{
    font-size:26px;
    cursor:pointer;
    color:var(--gold);
    user-select:none;
  }

  .dropdown{
    display:none;
    flex-direction:column;
    background:#111;
    border-top:1px solid rgba(255,204,51,0.25);
  }

  .dropdown a{
    padding:12px 20px;
    text-decoration:none;
    color:var(--muted);
    border-bottom:1px solid rgba(255,255,255,0.05);
  }

  .dropdown a:hover{
    color:var(--gold-glow);
  }

  section{
    padding:30px 20px;
  }

  .section-title{
    font-size:18px;
    margin-bottom:15px;
    color:var(--gold);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
  }

  .card{
    background:var(--panel);
    border:1px solid rgba(255,204,51,0.18);
    border-radius:12px;
    padding:18px;
    text-align:center;
    cursor:pointer;
    transition:0.2s;
  }

  .card:hover{
    transform:translateY(-4px);
    border-color:rgba(255,204,51,0.7);
    box-shadow:0 0 18px rgba(255,204,51,0.12);
  }

  .name{
    font-size:14px;
    margin-bottom:8px;
  }

  .price{
    color:var(--gold-glow);
    font-weight:bold;
  }

  footer{
    text-align:center;
    padding:20px;
    font-size:12px;
    color:#777;
    border-top:1px solid rgba(255,204,51,0.2);
    margin-top:10px;
  }
</style>
</head>

<body>

<header>

  <div class="topbar">
    <div class="logo">SUNQS MARKET</div>
    <div class="menu" onclick="toggleMenu()">☰</div>
  </div>

  <div id="dropdown" class="dropdown">
    <a href="#featured">Featured</a>
    <a href="#new">New Arrivals</a>
    <a href="#contact">Contact</a>
  </div>

</header>

<section id="featured">
  <div class="section-title">Featured</div>
  <div class="grid">

    <div class="card">
      <div class="name">Product Placeholder</div>
      <div class="price">$00.00</div>
    </div>

    <div class="card">
      <div class="name">Product Placeholder</div>
      <div class="price">$00.00</div>
    </div>

  </div>
</section>

<section id="new">
  <div class="section-title">New Arrivals</div>
  <div class="grid">

    <div class="card">
      <div class="name">Product Placeholder</div>
      <div class="price">$00.00</div>
    </div>

    <div class="card">
      <div class="name">Product Placeholder</div>
      <div class="price">$00.00</div>
    </div>

  </div>
</section>

<section id="contact">
  <div class="section-title">Contact</div>
  <p style="color:#aaa">
    Email: support@sunq.store<br/>
    Instagram: @sunqsmarket
  </p>
</section>

<footer>
  © 2026 SUNQS MARKET
</footer>

<script>
function toggleMenu(){
  const menu = document.getElementById("dropdown");
  menu.style.display = (menu.style.display === "flex") ? "none" : "flex";
}
</script>

</body>
</html>
