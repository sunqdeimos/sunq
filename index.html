<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SUNQ MARKET</title>

<style>
  :root{
    --bg:#070707;
    --panel:#171717;
    --gold:#ffcc33;
    --gold-glow:#ffd966;
    --text:#f5f5f5;
    --muted:#b5b5b5;
  }

  body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  header{
    padding:32px 20px;
    text-align:center;
    background:linear-gradient(180deg,#121212,#070707);
    border-bottom:1px solid rgba(255,204,51,0.35);
  }

  h1{
    margin:0;
    color:var(--gold);
    letter-spacing:3px;
    font-size:28px;
  }

  .subtitle{
    margin-top:6px;
    color:var(--muted);
    font-size:14px;
  }

  nav{
    margin-top:12px;
  }

  nav a{
    color:var(--muted);
    margin:0 10px;
    text-decoration:none;
    font-size:14px;
  }

  nav a:hover{
    color:var(--gold-glow);
  }

  section{
    padding:30px 20px;
  }

  .section-title{
    font-size:18px;
    margin-bottom:15px;
    color:var(--gold);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
  }

  .card{
    background:var(--panel);
    border:1px solid rgba(255,204,51,0.18);
    border-radius:12px;
    padding:18px;
    text-align:center;
    cursor:pointer;
    transition:0.2s;
  }

  .card:hover{
    transform:translateY(-4px);
    border-color:rgba(255,204,51,0.7);
    box-shadow:0 0 18px rgba(255,204,51,0.12);
  }

  .name{
    font-size:14px;
    margin-bottom:8px;
  }

  .price{
    color:var(--gold-glow);
    font-weight:bold;
  }

  footer{
    text-align:center;
    padding:20px;
    font-size:12px;
    color:#777;
    border-top:1px solid rgba(255,204,51,0.25);
    margin-top:10px;
  }
</style>
</head>

<body>

<header>
  <h1>SUNQ MARKET</h1>
  <div class="subtitle">a modern marketplace — simple, fast, clean</div>

  <nav>
    <a href="#featured">Featured</a>
    <a href="#new">New</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section id="featured">
  <div class="section-title">Featured</div>
  <div class="grid">

    <div class="card">
      <div class="name">Product Placeholder</div>
      <div class="price">$00.00</div>
    </div>

    <div class="card">
      <div class="name">Product Placeholder</div>
      <div class="price">$00.00</div>
    </div>

  </div>
</section>

<section id="new">
  <div class="section-title">New Arrivals</div>
  <div class="grid">

    <div class="card">
      <div class="name">Product Placeholder</div>
      <div class="price">$00.00</div>
    </div>

    <div class="card">
      <div class="name">Product Placeholder</div>
      <div class="price">$00.00</div>
    </div>

  </div>
</section>

<section id="contact">
  <div class="section-title">Contact</div>
  <p style="color:#aaa">
    Email: support@sunq.store<br/>
    Instagram: @sunqmarket
  </p>
</section>

<footer>
  © 2026 SUNQ MARKET
</footer>

</body>
</html>
