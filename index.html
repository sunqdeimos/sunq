<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUNQ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <script src="data.js"></script>
  <script src="store-ui.js"></script>
</head>

<body>

  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">SUNQ</a>

      <div class="nav-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
      </div>
    </div>
  </nav>

  <header class="hero">
    <div class="hero-content">
      <h1>Welcome mat deployed.</h1>
      <p>Curated drops from SUNQ.</p>
      <a href="shop.html" class="button-primary">Enter Shop</a>
    </div>
  </header>

  <section class="shop">
    <h2 class="page-title">Featured Drops</h2>
    <div id="featured-grid"></div>
  </section>

  <footer style="padding:40px; text-align:center; color:#666;">
    SUNQ — W.I.P marketplace
  </footer>

  <script>
    updateCartCount();

    const featured = ["s1", "s4", "s8"].map(id => PRODUCTS[id]);
    renderGrid("featured-grid", featured);

    window.addEventListener("storage", updateCartCount);
  </script>

</body>
</html>
