<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNQ | Home</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">SUNQ</a>
            <div class="nav-links">
                <a href="shop.html">Shop</a>
                <a href="about.html">About</a>
                <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            </div>
        </div>
    </nav>

    <main>
        <section class="hero">
            <h1 class="hero-title">SUNQ / JETS</h1>
            <p class="hero-subtitle">Streetwear & technical apparel</p>
            <a href="shop.html" class="button-primary">Shop Now</a>
        </section>

        <!-- You can keep your existing featured content or collections preview here -->
    </main>

    <script>
        // Cart counter - keeps the number in nav bar updated
        function updateCartCountDisplay() {
            const cart = JSON.parse(localStorage.getItem('sunqCart')) || [];
            let total = 0;
            cart.forEach(item => { total += item.quantity; });
            const countSpan = document.getElementById('cart-count');
            if (countSpan) countSpan.innerText = total;
        }
        updateCartCountDisplay();
        // Listen for cart changes from other tabs
        window.addEventListener('storage', updateCartCountDisplay);
    </script>

    <!-- Optional: ensure hero styling matches your existing CSS -->
    <style>
        .hero {
            text-align: center;
            padding: 8rem 2rem;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        }
        .hero-title {
            font-size: 4rem;
            color: var(--gold, #D4AF37);
            margin-bottom: 1rem;
        }
        .hero-subtitle {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
        .button-primary {
            background: var(--gold, #D4AF37);
            color: #0a0a0a;
            padding: 0.8rem 2rem;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            transition: background 0.2s;
        }
        .button-primary:hover {
            background: #c5a028;
        }
    </style>
</body>
</html>
