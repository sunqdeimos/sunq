<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SUNQS MARKET</title>

<style>
  :root{
    --bg:#070707;
    --panel:#171717;
    --gold:#ffcc33;
    --gold-glow:#ffd966;
    --text:#f5f5f5;
    --muted:#b5b5b5;
  }

  body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  header{
    background:linear-gradient(180deg,#121212,#070707);
    border-bottom:1px solid rgba(255,204,51,0.3);
    padding-bottom:10px;
  }

  .topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
  }

  .logo{
    color:var(--gold);
    font-weight:bold;
    letter-spacing:2px;
    font-size:18px;
  }

  .menu{
    font-size:26px;
    cursor:pointer;
    color:var(--gold);
  }

  .search{
    padding:0 20px 15px 20px;
  }

  .search input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:none;
    outline:none;
    background:#111;
    color:white;
  }

  .filters{
    display:flex;
    gap:10px;
    padding:0 20px 15px 20px;
    flex-wrap:wrap;
  }

  .filters button{
    background:#111;
    border:1px solid rgba(255,204,51,0.2);
    color:var(--muted);
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
  }

  .filters button:hover{
    color:var(--gold);
    border-color:var(--gold);
  }

  section{
    padding:25px 20px;
  }

  .title{
    color:var(--gold);
    margin-bottom:15px;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
  }

  .card{
    background:var(--panel);
    border:1px solid rgba(255,204,51,0.18);
    border-radius:12px;
    padding:16px;
    cursor:pointer;
    transition:0.2s;
    text-decoration:none;
    color:inherit;
  }

  .card:hover{
    transform:translateY(-4px);
    border-color:rgba(255,204,51,0.7);
    box-shadow:0 0 18px rgba(255,204,51,0.12);
  }

  .name{
    margin-bottom:6px;
    font-size:14px;
  }

  .price{
    color:var(--gold-glow);
    font-weight:bold;
  }

  .cart{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#111;
    border:1px solid rgba(255,204,51,0.3);
    padding:12px 14px;
    border-radius:50px;
    color:var(--gold);
    cursor:pointer;
  }

  footer{
    text-align:center;
    padding:20px;
    color:#777;
    font-size:12px;
    border-top:1px solid rgba(255,204,51,0.2);
  }
</style>
</head>

<body>

<header>
  <div class="topbar">
    <div class="logo">SUNQS MARKET</div>
    <div class="menu">☰</div>
  </div>

  <div class="search">
    <input type="text" placeholder="Search listings..." />
  </div>

  <div class="filters">
    <button>All</button>
    <button>Featured</button>
    <button>New</button>
    <button>Popular</button>
  </div>
</header>

<section>
  <div class="title">Featured Listings</div>
  <div class="grid">

    <a class="card" href="#">
      <div class="name">Listing One</div>
      <div class="price">$10</div>
    </a>

    <a class="card" href="#">
      <div class="name">Listing Two</div>
      <div class="price">$20</div>
    </a>

    <a class="card" href="#">
      <div class="name">Listing Three</div>
      <div class="price">$30</div>
    </a>

  </div>
</section>

<section>
  <div class="title">New Listings</div>
  <div class="grid">

    <a class="card" href="#">
      <div class="name">New Item A</div>
      <div class="price">$12</div>
    </a>

    <a class="card" href="#">
      <div class="name">New Item B</div>
      <div class="price">$18</div>
    </a>

    <a class="card" href="#">
      <div class="name">New Item C</div>
      <div class="price">$25</div>
    </a>

  </div>
</section>

<div class="cart">Cart (0)</div>

<footer>
  © 2026 SUNQS MARKET
</footer>

</body>
</html></html>
