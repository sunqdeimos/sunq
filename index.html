<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNQS MARKET</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#ffcc33;
  --gold2:#ffae00;
  --gold3:#ffd86a;
  --dark:#050505;
  --panel:rgba(5,5,5,0.72);
  --border:rgba(255,204,51,0.20);
}

body{
  margin:0;
  font-family:Inter, Arial;
  color:#fff;

  /* image removed because it was causing issues */
  background:
    linear-gradient(to bottom, rgba(0,0,0,0.85), rgba(0,0,0,0.95)),
    #050505;

  background-size:cover;
  background-position:center;
  background-attachment:fixed;

  opacity:0;
  transition:0.6s ease;
  overflow-x:hidden;
}

body.loaded{opacity:1;}

header{
  padding:18px 22px;
  border-bottom:1px solid rgba(255,204,51,0.15);
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(14px);
  z-index:100;
}

.navlink{
  color:var(--gold3);
  text-decoration:none;
  margin-right:14px;
  font-weight:600;
  transition:0.2s ease;
}

.navlink:hover{
  color:var(--gold2);
  text-shadow:0 0 18px rgba(255,204,51,0.5);
}

.hero{
  text-align:center;
  padding:120px 20px 70px;
  position:relative;
}

.hero h1{
  font-size:52px;
  letter-spacing:5px;
  color:var(--gold3);
  margin:0;
  text-shadow:0 0 20px rgba(255,204,51,0.25);
}

.hero p{
  margin-top:14px;
  color:#ddd;
  font-size:16px;
}

.cta{
  margin-top:30px;
  display:flex;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
}

button{
  padding:13px 18px;
  border-radius:16px;
  font-weight:800;
  cursor:pointer;
  transition:0.25s ease;
  font-family:Inter, Arial;
}

.btn-primary{
  background:linear-gradient(135deg,var(--gold3),var(--gold2));
  border:none;
  color:#000;
  box-shadow:0 18px 60px rgba(255,204,51,0.20);
}

.btn-primary:hover{
  transform:translateY(-3px) scale(1.03);
  box-shadow:0 22px 80px rgba(255,204,51,0.35);
}

.btn-secondary{
  background:rgba(0,0,0,0.45);
  border:1px solid rgba(255,204,51,0.45);
  color:var(--gold3);
}

.btn-secondary:hover{
  transform:translateY(-3px);
  border-color:var(--gold3);
  box-shadow:0 15px 40px rgba(255,204,51,0.15);
}

.section{
  max-width:1100px;
  margin:0 auto;
  padding:60px 20px;
}

.section-title{
  font-size:22px;
  font-weight:800;
  margin-bottom:18px;
  color:var(--gold3);
  text-shadow:0 0 15px rgba(255,204,51,0.2);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:18px;
}

.feature-card{
  background:var(--panel);
  border:1px solid var(--border);
}
</style>

</head>
<body>

<header>
  <a class="navlink" href="index.html">Home</a>
  <a class="navlink" href="shop.html">Market</a>
  <a class="navlink" href="about.html">Profile</a>
</header>

<div class="hero">
  <h1>SUNQS MARKET</h1>
  <p>A clean marketplace interface</p>

  <div class="cta">
    <button class="btn-primary">Enter</button>
    <button class="btn-secondary">Learn More</button>
  </div>
</div>

<div class="section">
  <div class="section-title">Features</div>
  <div class="grid">
    <div class="feature-card"></div>
    <div class="feature-card"></div>
    <div class="feature-card"></div>
  </div>
</div>

<script>
window.addEventListener("load", () => {
  document.body.classList.add("loaded");
});
</script>

</body>
</html>
