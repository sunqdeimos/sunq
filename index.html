<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNQS MARKET</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:#070707;
  color:#fff;
  opacity:0;
  transition:opacity 0.6s ease;
}

body.loaded{opacity:1;}

header{
  padding:20px;
  border-bottom:1px solid rgba(255,204,51,0.15);
  background:rgba(10,10,10,0.85);
  backdrop-filter:blur(10px);
}

a{
  color:#ffcc33;
  text-decoration:none;
  margin-right:12px;
}

button{
  padding:12px 16px;
  background:#111;
  border:1px solid #ffcc33;
  color:#ffcc33;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(255,204,51,0.15);
}
</style>
</head>

<body>

<header>
  <a href="index.html" onclick="navigate(event,'index.html')">Home</a>
  <a href="sunqs.html" onclick="navigate(event,'sunqs.html')">SUNQS SIDE</a>
  <a href="jets.html" onclick="navigate(event,'jets.html')">JETS SIDE</a>
</header>

<div style="text-align:center;padding:100px 20px;">
  <h1 style="color:#ffcc33;">SUNQS MARKET</h1>
  <p style="color:#aaa;">W.I.P online marketplace</p>
  <a href="sunqs.html" onclick="navigate(event,'sunqs.html')">
    <button>Enter Shop</button>
  </a>
</div>

<script>
window.addEventListener("load",()=>document.body.classList.add("loaded"));

function navigate(e,url){
  e.preventDefault();
  document.body.classList.remove("loaded");
  setTimeout(()=>window.location.href=url,400);
}
</script>

</body>
</html>
