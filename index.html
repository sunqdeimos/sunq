<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNQS MARKET | Home</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:
    radial-gradient(circle at top, rgba(255,204,51,0.08), transparent 40%),
    #070707;
  color:#fff;
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(6px);}
  to{opacity:1; transform:translateY(0);}
}

header{
  padding:20px;
  border-bottom:1px solid rgba(255,204,51,0.15);
  background:rgba(10,10,10,0.8);
  backdrop-filter:blur(10px);
}

a{
  color:#ffcc33;
  text-decoration:none;
  margin-right:15px;
}

.hero{
  text-align:center;
  padding:90px 20px;
}

h1{
  color:#ffcc33;
  letter-spacing:2px;
}

button{
  padding:12px 16px;
  background:#111;
  border:1px solid #ffcc33;
  color:#ffcc33;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 20px rgba(255,204,51,0.15);
}
</style>
</head>

<body>

<header>
  <a href="index.html">Home</a>
  <a href="shop.html">Shop</a>
</header>

<div class="hero">
  <h1>SUNQS MARKET</h1>
  <p style="color:#aaa;">minimal digital storefront</p>
  <a href="shop.html"><button>Enter Shop</button></a>
</div>

</body>
</html>
