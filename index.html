<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>sunq store</title>

<style>
  :root{
    --bg:#0a0a0a;
    --panel:#141414;
    --gold:#d4af37;
    --text:#f5f5f5;
    --muted:#aaa;
  }

  body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  header{
    padding:30px 20px;
    text-align:center;
    border-bottom:1px solid rgba(212,175,55,0.3);
    background:#111;
  }

  h1{
    margin:0;
    color:var(--gold);
    letter-spacing:2px;
  }

  nav{
    margin-top:10px;
  }

  nav a{
    color:var(--muted);
    margin:0 10px;
    text-decoration:none;
    font-size:14px;
  }

  nav a:hover{
    color:var(--gold);
  }

  section{
    padding:30px 20px;
  }

  .section-title{
    font-size:18px;
    margin-bottom:15px;
    color:var(--gold);
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
  }

  .card{
    background:var(--panel);
    border:1px solid rgba(212,175,55,0.15);
    border-radius:12px;
    padding:20px;
    text-align:center;
    cursor:pointer;
    transition:0.2s;
    text-decoration:none;
    color:inherit;
  }

  .card:hover{
    transform:translateY(-4px);
    border-color:rgba(212,175,55,0.6);
  }

  .name{
    font-size:14px;
    margin-bottom:8px;
  }

  .price{
    color:var(--gold);
    font-weight:bold;
  }

  footer{
    text-align:center;
    padding:20px;
    font-size:12px;
    color:#666;
    border-top:1px solid rgba(212,175,55,0.2);
  }
</style>
</head>

<body>

<header>
  <h1>SUNQ STORE</h1>
  <nav>
    <a href="#featured">Featured</a>
    <a href="#new">New</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section id="featured">
  <div class="section-title">Featured Products</div>
  <div class="grid">

    <div class="card">
      <div class="name">Product Placeholder</div>
      <div class="price">$00.00</div>
    </div>

    <div class="card">
      <div class="name">Product Placeholder</div>
      <div class="price">$00.00</div>
    </div>

  </div>
</section>

<section id="new">
  <div class="section-title">New Arrivals</div>
  <div class="grid">

    <div class="card">
      <div class="name">Product Placeholder</div>
      <div class="price">$00.00</div>
    </div>

    <div class="card">
      <div class="name">Product Placeholder</div>
      <div class="price">$00.00</div>
    </div>

  </div>
</section>

<section id="contact">
  <div class="section-title">Contact</div>
  <p style="color:#aaa">
    Email: support@sunq.store<br/>
    Instagram: @sunqstore
  </p>
</section>

<footer>
  © 2026 sunq store
</footer>

</body>
</html>
