<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUNQS MARKET</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#070707;
  color:#fff;
  opacity:0;
  transition:0.6s ease;
}

body.loaded{opacity:1;}

header{
  padding:20px;
  border-bottom:1px solid #333;
}

a{
  color:#ffcc33;
  text-decoration:none;
  margin-right:12px;
}

.hero{
  text-align:center;
  padding:100px 20px;
}

h1{
  color:#ffcc33;
  letter-spacing:3px;
}

button{
  padding:12px 16px;
  background:#111;
  border:1px solid #ffcc33;
  color:#ffcc33;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <a href="index.html" onclick="nav(event,'index.html')">Home</a>
  <a href="shop.html" onclick="nav(event,'shop.html')">Shop</a>
</header>

<div class="hero">
  <h1>SUNQS MARKET</h1>
  <p style="color:#aaa;">W.I.P online marketplace</p>

  <a href="shop.html" onclick="nav(event,'shop.html')">
    <button>Enter Store</button>
  </a>
</div>

<script>
window.onload=()=>document.body.classList.add("loaded");

function nav(e,url){
  e.preventDefault();
  document.body.classList.remove("loaded");
  setTimeout(()=>location.href=url,400);
}
</script>

</body>
</html>
