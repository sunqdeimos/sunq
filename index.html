<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sunq store</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #f5f5f5;
    }

    header {
      text-align: center;
      padding: 30px 20px;
      background: #111;
      border-bottom: 1px solid #d4af37;
    }

    h1 {
      margin: 0;
      color: #d4af37;
      letter-spacing: 2px;
    }

    .subtitle {
      color: #aaa;
      margin-top: 5px;
      font-size: 14px;
    }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 15px;
    }

    .card {
      background: #141414;
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
    }

    .name {
      margin-bottom: 10px;
    }

    .price {
      color: #d4af37;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #777;
      font-size: 12px;
      border-top: 1px solid rgba(212,175,55,0.2);
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <header>
    <h1>SUNQ STORE</h1>
    <div class="subtitle">simple gold-themed storefront</div>
  </header>

  <div class="container">

    <div class="card">
      <div class="name">product one</div>
      <div class="price">$10</div>
    </div>

    <div class="card">
      <div class="name">product two</div>
      <div class="price">$20</div>
    </div>

    <div class="card">
      <div class="name">product three</div>
      <div class="price">$30</div>
    </div>

    <div class="card">
      <div class="name">product four</div>
      <div class="price">$40</div>
    </div>

  </div>

  <footer>
    © 2026 sunq store
  </footer>

</body>
</html>
