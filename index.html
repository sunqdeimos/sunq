<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUNQ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <!-- PRODUCTS -->
  <script src="data.js"></script>
</head>

<body>

  <!-- NAV -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">SUNQ</a>

      <div class="nav-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-content">
      <h1>Welcome mat deployed.</h1>
      <p>Curated drops from SUNQ.</p>
      <a href="shop.html" class="button-primary">Enter Shop</a>
    </div>
  </header>

  <!-- FEATURED -->
  <section class="shop">
    <h2 class="page-title">Featured Drops</h2>

    <div class="grid" id="featured"></div>
  </section>

  <!-- FOOTER -->
  <footer style="padding:40px; text-align:center; color:#666;">
    SUNQ — W.I.P marketplace
  </footer>

  <script>
    function getCart() {
      return JSON.parse(localStorage.getItem("sunqCart")) || [];
    }

    function updateCartCount() {
      const cart = getCart();
      const total = cart.reduce((sum, i) => sum + i.quantity, 0);
      const el = document.getElementById("cart-count");
      if (el) el.textContent = total;
    }

    function renderFeatured() {
      const featuredIds = ["s1", "s4", "s8"];
      const container = document.getElementById("featured");

      container.innerHTML = featuredIds.map(id => {
        const p = getProduct(id);

        if (!p) return "";

        return `
          <a class="card fade" href="product.html?id=${p.id}">
            <img class="card-image" src="${p.image}" alt="${p.name}">
            <h3>${p.name}</h3>
            <p>$${p.price}</p>
          </a>
        `;
      }).join("");
    }

    updateCartCount();
    renderFeatured();

    window.addEventListener("storage", updateCartCount);
  </script>

</body>
</html>
