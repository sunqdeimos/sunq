<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JETS SIDE</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#070707;
  color:#fff;
  opacity:0;
  transition:opacity 0.6s ease;
}

body.loaded{opacity:1;}

header{
  padding:20px;
  border-bottom:1px solid rgba(255,204,51,0.15);
  background:rgba(10,10,10,0.85);
  backdrop-filter:blur(10px);
}

a{
  color:#ffcc33;
  text-decoration:none;
  margin-right:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:#111;
  border:1px solid #ffcc33;
  padding:15px;
  border-radius:12px;
  cursor:pointer;
  transition:0.25s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 10px 25px rgba(255,204,51,0.12);
}
</style>
</head>

<body>

<header>
  <a href="index.html" onclick="navigate(event,'index.html')">Home</a>
  <a href="sunqs.html" onclick="navigate(event,'sunqs.html')">SUNQS SIDE</a>
  <a href="jets.html" onclick="navigate(event,'jets.html')">JETS SIDE</a>
</header>

<div class="grid">
  <div class="card" onclick="go(101)">JETS A<div style="color:#ffcc33">$12</div></div>
  <div class="card" onclick="go(102)">JETS B<div style="color:#ffcc33">$18</div></div>
  <div class="card" onclick="go(103)">JETS C<div style="color:#ffcc33">$22</div></div>
  <div class="card" onclick="go(104)">JETS D<div style="color:#ffcc33">$28</div></div>
  <div class="card" onclick="go(105)">JETS E<div style="color:#ffcc33">$33</div></div>
  <div class="card" onclick="go(106)">JETS F<div style="color:#ffcc33">$40</div></div>
</div>

<script>
window.addEventListener("load",()=>document.body.classList.add("loaded"));

function navigate(e,url){
  e.preventDefault();
  document.body.classList.remove("loaded");
  setTimeout(()=>window.location.href=url,400);
}

function go(id){
  navigate(event,"product.html?item="+id);
}
</script>

</body>
</html>
