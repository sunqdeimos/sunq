<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | SUNQ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">SUNQ</a>
            <div class="nav-links">
                <a href="shop.html">Shop</a>
                <a href="about.html">About</a>
                <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            </div>
        </div>
    </nav>

    <main class="about-page">
        <h1>About SUNQ</h1>
        <p>Place holder</p>
        <hr>
        <p><strong>Contact:</strong> studio@sunq.com</p>
    </main>

    <script>
        // Cart counter - same as other pages
        function updateCartCountDisplay() {
            const cart = JSON.parse(localStorage.getItem('sunqCart')) || [];
            let total = 0;
            cart.forEach(item => { total += item.quantity; });
            const countSpan = document.getElementById('cart-count');
            if (countSpan) countSpan.innerText = total;
        }
        updateCartCountDisplay();
        window.addEventListener('storage', updateCartCountDisplay);
    </script>

    <style>
        .about-page {
            max-width: 800px;
            margin: 4rem auto;
            padding: 0 2rem;
            line-height: 1.6;
        }
        .about-page h1 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            color: var(--gold, #D4AF37);
        }
        .about-page p {
            margin: 1rem 0;
        }
        hr {
            margin: 2rem 0;
            border-color: #333;
        }
    </style>
</body>
</html>
